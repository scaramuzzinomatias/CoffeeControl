function stopRemoteWifiScanPoll(){
  if(remoteWifiScanPollTimer){clearTimeout(remoteWifiScanPollTimer);remoteWifiScanPollTimer=null;}
  remoteWifiScanCommandId=null;
}

function setRemoteWifiScanStatus(msg){
  const el=document.getElementById('mwScanStatus');
  if(!el) return;
  if(!msg){el.style.display='none';el.textContent='';return;}
  el.textContent=msg;
  el.style.display='block';
}

function renderRemoteWifiNetworks(networks){
  const list=document.getElementById('mwScanList');
  if(!list) return;
  const current=document.getElementById('mwSsid')?.value||'';
  if(!Array.isArray(networks)||!networks.length){
    list.style.display='none';
    list.innerHTML='';
    return;
  }
  list.innerHTML=networks.map(net=>{
    const active=current===net.ssid;
    return `<button type="button" class="scan-panel-btn ${active?'is-active':''}" data-ssid="${net.ssid.replace(/"/g,'&quot;')}">
      <strong>${net.ssid}</strong>
      <span class="scan-panel-meta">${net.secure?'Contraseña requerida':'Red abierta'} | Señal ${net.rssi} dBm</span>
    </button>`;
  }).join('');
  list.style.display='block';
  list.querySelectorAll('.scan-panel-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const ssid=btn.getAttribute('data-ssid')||'';
      const input=document.getElementById('mwSsid');
      if(input) input.value=ssid;
      list.querySelectorAll('.scan-panel-btn').forEach(x=>x.classList.remove('is-active'));
      btn.classList.add('is-active');
      setRemoteWifiScanStatus(`Red seleccionada: ${ssid}`);
      const pass=document.getElementById('mwPass');
      if(pass) pass.focus();
    });
  });
}

async function pollRemoteWifiCommand(machineId,commandId,attempt=0){
  try{
    const d=await api('GET',`/api/machines/${machineId}/commands/${commandId}`);
    const cmd=d.command;
    if(!cmd){throw new Error('Sin estado de comando');}
    if(cmd.status==='completed'){
      const nets=cmd.result?.networks||[];
      setRemoteWifiScanStatus(cmd.result?.message||`Escaneo completado (${nets.length} red${nets.length!==1?'es':''}).`);
      renderRemoteWifiNetworks(nets);
      const btn=document.getElementById('mwScanBtn');
      if(btn) btn.disabled=false;
      stopRemoteWifiScanPoll();
      return;
    }
    if(cmd.status==='failed'){
      setRemoteWifiScanStatus(cmd.result?.message||'No se pudo completar el escaneo remoto.');
      renderRemoteWifiNetworks([]);
      const btn=document.getElementById('mwScanBtn');
      if(btn) btn.disabled=false;
      stopRemoteWifiScanPoll();
      return;
    }
    if(attempt>=20){
      setRemoteWifiScanStatus('El escaneo está tardando más de lo esperado. Probá de nuevo en unos segundos.');
      const btn=document.getElementById('mwScanBtn');
      if(btn) btn.disabled=false;
      stopRemoteWifiScanPoll();
      return;
    }
    remoteWifiScanPollTimer=setTimeout(()=>pollRemoteWifiCommand(machineId,commandId,attempt+1),2000);
  }catch(e){
    setRemoteWifiScanStatus('No se pudo consultar el resultado del escaneo remoto.');
    const btn=document.getElementById('mwScanBtn');
    if(btn) btn.disabled=false;
    stopRemoteWifiScanPoll();
  }
}

async function scanRemoteWifi(machineId){
  const btn=document.getElementById('mwScanBtn');
  if(btn) btn.disabled=true;
  renderRemoteWifiNetworks([]);
  setRemoteWifiScanStatus('Pidiendo a la máquina que escanee redes visibles...');
  stopRemoteWifiScanPoll();
  try{
    const d=await api('POST',`/api/machines/${machineId}/commands`,{type:'wifi_scan'});
    remoteWifiScanCommandId=d.command?.id||null;
    if(!remoteWifiScanCommandId) throw new Error('No se recibió ID de comando');
    setRemoteWifiScanStatus('Escaneando redes desde la máquina...');
    pollRemoteWifiCommand(machineId,remoteWifiScanCommandId,0);
  }catch(e){
    setRemoteWifiScanStatus(e.message||'No se pudo iniciar el escaneo remoto.');
    if(btn) btn.disabled=false;
    stopRemoteWifiScanPoll();
  }
}

function formatDiagValue(value,fallback='—'){
  return value===null || value===undefined || value==='' ? fallback : String(value);
}

function formatDiagUptime(ms){
  const totalSeconds=Math.max(0,Math.floor(Number(ms||0)/1000));
  const minutes=Math.floor(totalSeconds/60);
  const seconds=totalSeconds%60;
  if(minutes<=0) return `${seconds}s`;
  const hours=Math.floor(minutes/60);
  const remMinutes=minutes%60;
  if(hours<=0) return `${minutes}m ${seconds}s`;
  return `${hours}h ${remMinutes}m ${seconds}s`;
}

function remoteDiagBackendHealthLabel(arg1){

function remoteDiagNfcDenyLabel(arg1){
  if(arg1===403) return 'rechazado por backend';
  if(arg1===401) return 'máquina no autorizada o secret inválido';
  if(arg1===1) return 'límite diario alcanzado offline';
  if(arg1===2) return 'tarjeta desconocida offline';
  if(arg1>0) return `HTTP ${arg1}`;
  return 'motivo no identificado';
}

function describeRemoteDiagEvent(event){
  const name=String(event?.name||event?.code||'UNKNOWN');
  const arg1=Number(event?.arg1||0);
  const arg2=Number(event?.arg2||0);
  switch(name){
    case 'BOOT':
      return `Arranque del equipo. Reset: ${remoteDiagResetReasonLabel(arg1)}.`;
    case 'WIFI_CONNECT_OK':
      return `WiFi conectado correctamente. RSSI ${arg1} dBm.`;
    case 'WIFI_CONNECT_FAIL':
      return 'No pudo conectarse al WiFi guardado.';
    case 'WIFI_RECONNECTED':
      return `WiFi reconectado. RSSI ${arg1} dBm.`;
    case 'BACKEND_HEALTH_OK':
      return `Backend alcanzable. /health respondió HTTP ${arg1}.`;
    case 'BACKEND_HEALTH_FAIL':
      return `Falla de conectividad con backend: ${remoteDiagBackendHealthLabel(arg1)}.`;
    case 'BACKEND_REGISTER_OK':
      return `Máquina aprobada por backend. Precio activo ${arg2}.`;
    case 'BACKEND_REGISTER_PENDING':
      return 'Máquina pendiente de aprobación en backend.';
    case 'BACKEND_REGISTER_FAIL':
      return `Falló el registro de máquina: ${remoteDiagBackendHealthLabel(arg1)}.`;
    case 'BACKEND_CARDS_OK':
      return `Cache de tarjetas descargada. Tarjetas: ${arg1}.`;
    case 'BACKEND_CARDS_FAIL':
      return `Falló la descarga de tarjetas. Detalle: ${remoteDiagBackendHealthLabel(arg1)}.`;
    case 'NFC_READ':
      return 'Se leyó una tarjeta NFC.';
    case 'NFC_APPROVED_ONLINE':
      return 'Tarjeta aprobada online por backend.';
    case 'NFC_APPROVED_OFFLINE':
      return 'Tarjeta aprobada offline con cache local.';
    case 'NFC_DENIED':
      return `Tarjeta rechazada: ${remoteDiagNfcDenyLabel(arg1)}.`;
    case 'QUEUE_ENQUEUE':
      return `Evento guardado offline. Pendientes en cola: ${arg2}.`;
    case 'QUEUE_FULL':
      return 'Cola offline llena. El equipo descartó nuevos eventos.';
    case 'QUEUE_FLUSH_OK':
      return `Cola offline sincronizada. Enviados: ${arg1}, pendientes: ${arg2}.`;
    case 'QUEUE_FLUSH_FAIL':
      return `Falló la sincronización de cola offline. Código: ${arg1}.`;
    case 'QUEUE_PERSIST_FAIL':
      return 'Falló la persistencia local de la cola offline.';
    case 'MDB_RESET':
      return 'La máquina expendedora reinició el periférico cashless.';
    case 'MDB_BEGIN_SESSION':
      return `Sesión MDB iniciada. Fondos ofrecidos: ${arg2}.`;
    case 'MDB_VEND_REQUEST':
      return `La máquina pidió venta. Selección ${arg1}, monto ${arg2}.`;
    case 'MDB_VEND_SUCCESS':
      return `Venta confirmada por la máquina. Selección ${arg1}, monto ${arg2}.`;
    case 'MDB_VEND_FAILURE':
      return `Venta fallida o cancelada. Selección ${arg1}, monto ${arg2}.`;
    case 'MDB_VEND_END':
      return 'La máquina cerró la sesión MDB.';
    case 'SESSION_TIMEOUT':
      return `La sesión venció sin cierre correcto. Duración ${formatDiagUptime(arg2)}.`;
    case 'MDB_SETUP_CONFIG':
      return `Se capturó SETUP CONFIG del VMC. Level ${arg1}.`;
    case 'MDB_SETUP_PRICES':
      return `Se capturó SETUP PRICES. Min ${arg1}, max ${arg2}.`;
    case 'MDB_EXPANSION_REQUEST_ID':
      return 'El VMC consultó el REQUEST ID del lector cashless.';
    case 'MDB_TIME_DATE_REQUEST_SENT':
      return 'El lector pidió la hora MDB al VMC en el siguiente POLL.';
    case 'MDB_TIME_DATE_FILE': {
      const hour=(arg1>>8)&0xFF;
      const minute=arg1&0xFF;
      const year=(arg2>>24)&0xFF;
      const month=(arg2>>16)&0xFF;
      const day=(arg2>>8)&0xFF;
      const second=arg2&0xFF;
      return `La máquina envió fecha/hora MDB: 20${String(year).padStart(2,'0')}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')} ${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}:${String(second).padStart(2,'0')}.`;
    }
    case 'MDB_GATEWAY_RESET':
      return 'La máquina reinició el Communications Gateway 0x18.';
    case 'MDB_GATEWAY_SETUP':
      return `La máquina hizo SETUP del gateway. Feature level ${arg1}.`;
    case 'MDB_GATEWAY_CONTROL':

function formatRemoteDiagMdbTimeDate(setup){

function describeRemoteDiagMdb(setup){
  if(!setup?.seen_config && !setup?.seen_prices && !setup?.seen_request_id && !setup?.seen_time_date){
    return 'Todavía no se capturó SETUP MDB. Reiniciá la máquina o esperá un nuevo handshake cashless.';
  }
  const parts=[];
  if(setup?.seen_config){
    parts.push(`SETUP CONFIG visto. Level ${formatDiagValue(setup.vmc_level)}.`);
    parts.push(`Display ${formatDiagValue(setup.display_columns)} x ${formatDiagValue(setup.display_rows)}.`);
  }
  if(setup?.seen_prices){
    parts.push(`SETUP PRICES visto. Min ${formatDiagValue(setup.min_price)}, max ${formatDiagValue(setup.max_price)}.`);
  }
  if(setup?.seen_request_id){
    parts.push('El VMC ya consultó el REQUEST ID del lector.');
  }
  if(setup?.seen_time_date){
    parts.push(`Fecha/hora MDB vista: ${formatRemoteDiagMdbTimeDate(setup)}.`);
  }
    if(setup?.time_date_probe_pending){
      parts.push('Hay una solicitud manual de hora MDB pendiente para el próximo POLL.');
    }
  if(setup?.last_seen_ms!==null && setup?.last_seen_ms!==undefined){
    parts.push(`Último paquete capturado hace ${formatDiagUptime(setup.last_seen_ms)} desde el boot.`);
  }
  if(setup?.last_expansion_seen_ms!==null && setup?.last_expansion_seen_ms!==undefined && Number(setup.last_expansion_seen_ms)>0){
    parts.push(`Último EXPANSION capturado hace ${formatDiagUptime(setup.last_expansion_seen_ms)} desde el boot.`);
  }
    return parts.join(' ');
  }

  function describeRemoteDiagGateway(gateway){
    if(!gateway?.seen_setup && !gateway?.seen_identification && !gateway?.seen_time_date_request && !gateway?.seen_feature_enable && !gateway?.seen_control){
      return 'Todavía no se capturó actividad del gateway 0x18. Si la Rubino lo soporta, debería verse setup/control o alguna expansión del gateway.';
    }
    const parts=[];
    if(gateway?.seen_setup){
      parts.push(`Gateway SETUP visto. VMC feature ${formatDiagValue(gateway.vmc_feature_level)}.`);
    }
    if(gateway?.seen_identification){
      parts.push('La máquina ya consultó la identificación del gateway.');
    }
    if(gateway?.seen_feature_enable){
      parts.push(`La máquina habilitó features del gateway. Máscara ${formatDiagValue(gateway.enabled_features)}.`);
    }
    if(gateway?.seen_time_date_request){
      parts.push(`La máquina pidió fecha/hora al gateway. Última entregada: ${formatDiagValue(gateway?.time_date?.iso,'—')}.`);
    }
    if(gateway?.seen_control){
      parts.push(`Último CONTROL del gateway: ${formatDiagValue(gateway.control_state)}.`);
    }
    if(gateway?.last_seen_ms!==null && gateway?.last_seen_ms!==undefined){
      parts.push(`Último paquete gateway capturado hace ${formatDiagUptime(gateway.last_seen_ms)} desde el boot.`);
    }
    return parts.join(' ');
  }

function remoteDiagLatestMatchingEvent(result,predicate){
  const list=result?.events?.events||[];
  for(let i=list.length-1;i>=0;i--){
    if(predicate(list[i])) return list[i];
  }
  return null;
}

function describeRemoteDiagWifi(result){
  if(!result?.wifi_connected){
    return 'WiFi sin enlace en el momento del snapshot.';
  }
  const latest=remoteDiagLatestMatchingEvent(result,ev=>['WIFI_CONNECT_OK','WIFI_RECONNECTED'].includes(String(ev?.name||ev?.code||'')));
  if(latest) return describeRemoteDiagEvent(latest);
  return 'WiFi conectado al momento del diagnóstico.';
}

function describeRemoteDiagBackend(result){
  if(result?.backend_ready){
    const latestOk=remoteDiagLatestMatchingEvent(result,ev=>String(ev?.name||ev?.code||'')==='BACKEND_HEALTH_OK');
    return latestOk ? describeRemoteDiagEvent(latestOk) : 'Backend alcanzable al momento del diagnóstico.';
  }
  const latestFail=remoteDiagLatestMatchingEvent(result,ev=>['BACKEND_HEALTH_FAIL','BACKEND_REGISTER_FAIL','BACKEND_CARDS_FAIL','BACKEND_REGISTER_PENDING'].includes(String(ev?.name||ev?.code||'')));
  if(latestFail) return describeRemoteDiagEvent(latestFail);
  if(!result?.wifi_connected) return 'El backend figura no disponible porque la máquina no tenía enlace WiFi.';
  return 'Backend pendiente o sin respuesta en el momento del snapshot.';
}

function describeRemoteDiagQueue(result){
  const pending=Number(result?.queue_pending||0);
  if(pending<=0) return 'La cola offline está vacía.';
  const latest=remoteDiagLatestMatchingEvent(result,ev=>['QUEUE_ENQUEUE','QUEUE_FLUSH_OK','QUEUE_FLUSH_FAIL','QUEUE_FULL'].includes(String(ev?.name||ev?.code||'')));
  if(latest) return describeRemoteDiagEvent(latest);
  return `Hay ${formatReportInt(pending)} evento(s) pendientes en cola offline.`;
}

function remoteDiagCompatibilityHints(result){
  const hints=[];
  const setup=result?.mdb||{};
  const humanPrice=Math.max(0, Number(result?.price_cents)||0);
  const mdbUnits=machineHumanPriceToMdbUnits(humanPrice, result?.pricing_profile);

  if(!setup?.seen_config && !setup?.seen_prices){
    return [{
      tone:'info',
      text:'Todavía no hay un SETUP MDB capturado, así que no se puede comparar compatibilidad. Reiniciá la máquina o esperá un nuevo handshake cashless.'
    }];
  }

  hints.push({
    tone:'info',
    text:`Perfil activo ${pricingProfileAssistLabel(result?.pricing_profile)}. El precio humano ${formatMachinePriceValue(humanPrice)} se traduce a ${formatReportInt(mdbUnits)} unidades MDB.`
  });

  if(setup?.seen_prices){
    const min=Number(setup?.min_price);
    const max=Number(setup?.max_price);
    if(Number.isFinite(min) && Number.isFinite(max)){
      const withinMin=mdbUnits>=min;
      const withinMax=max<=0 ? true : mdbUnits<=max;
      if(withinMin && withinMax){
        hints.push({
          tone:'ok',
          text:`El precio convertido cae dentro del rango que anunció el VMC (${formatReportInt(min)} a ${formatReportInt(max)} unidades MDB).`
        });
      }else{
        hints.push({
          tone:'warn',
          text:`El precio convertido (${formatReportInt(mdbUnits)} unidades MDB) queda fuera del rango que anunció el VMC (${formatReportInt(min)} a ${formatReportInt(max)}). Revisá precio humano, perfil MDB o parámetros avanzados.`
        });
      }
    }
  }

  if(setup?.seen_config){
    const vmcLevel=Number(setup?.vmc_level);
    const featureLevel=Number(result?.mdb_feature_level);
    if(Number.isFinite(vmcLevel) && Number.isFinite(featureLevel)){
      if(featureLevel===vmcLevel){
        hints.push({
          tone:'ok',
          text:`El feature level del lector (${formatReportInt(featureLevel)}) coincide con el level detectado en el VMC (${formatReportInt(vmcLevel)}).`
        });
      }else if(featureLevel<vmcLevel){
        hints.push({
          tone:'info',
          text:`El VMC anunció level ${formatReportInt(vmcLevel)} y el lector está en feature ${formatReportInt(featureLevel)}. Esto suele funcionar en modo conservador; solo subilo si ves incompatibilidades reales.`
        });
      }else{
        hints.push({
          tone:'warn',
          text:`El lector anuncia feature ${formatReportInt(featureLevel)} por encima del level ${formatReportInt(vmcLevel)} detectado en el VMC. Si aparecen resets o secuencias fuera de orden, conviene igualarlo o bajarlo.`
        });
      }
    }
  }

  return hints;
}

function renderRemoteDiagCompatibilityHints(result){
  const palette={
    ok:{bg:'rgba(34,197,94,.10)',bd:'rgba(34,197,94,.28)',tx:'var(--txs)'},
    info:{bg:'rgba(59,130,246,.10)',bd:'rgba(59,130,246,.24)',tx:'var(--tx2)'},
    warn:{bg:'rgba(245,158,11,.12)',bd:'rgba(245,158,11,.28)',tx:'var(--txw)'}
  };
  return remoteDiagCompatibilityHints(result).map(hint=>{
    const style=palette[hint.tone]||palette.info;
    return `<div style="padding:10px 12px;border-radius:12px;background:${style.bg};border:1px solid ${style.bd};font-size:13px;line-height:1.45;color:${style.tx}">${escHtml(hint.text)}</div>`;
  }).join('');
}

function remoteDiagContextMeta(){
  let backendLabel=BASE||CURRENT_ORIGIN||window.location.origin||'—';
  let instanceLabel=backendLabel;
  try{
    const parsed=new URL(backendLabel);
    instanceLabel=parsed.hostname || backendLabel;
    backendLabel=parsed.origin || backendLabel;
  }catch(_error){
    instanceLabel=backendLabel;
  }
  let username='—';
  try{
    if(TOKEN){
      const payload=JSON.parse(atob(TOKEN.split('.')[1]));
      username=payload?.username || username;
    }
  }catch(_error){}
  const now=new Date();
  const stampParts=[
    now.getFullYear(),
    String(now.getMonth()+1).padStart(2,'0'),
    String(now.getDate()).padStart(2,'0')
  ];
  const timeParts=[
    String(now.getHours()).padStart(2,'0'),
    String(now.getMinutes()).padStart(2,'0'),
    String(now.getSeconds()).padStart(2,'0')
  ];
  return {
    generatedAt: now.toLocaleString('es-AR'),
    timestampTag: `${stampParts.join('')}_${timeParts.join('')}`,
    backendLabel,
    instanceLabel,
    username
  };
}

function setRemoteDiagExportState(enabled){
  ['mdDiagCopyBtn','mdDiagDownloadBtn'].forEach(id=>{
    const btn=document.getElementById(id);
    if(btn) btn.disabled=!enabled;
  });
}

async function copyRemoteDiagnosticsText(){
  if(!remoteDiagLastResult){
    setRemoteDiagStatus('Todavía no hay un diagnóstico para copiar.','error');
    return;
  }
  const text=buildRemoteDiagnosticsExportText(remoteDiagLastResult);
  try{
    if(navigator.clipboard?.writeText){
      await navigator.clipboard.writeText(text);
    }else{
      const area=document.createElement('textarea');
      area.value=text;
      area.setAttribute('readonly','readonly');
      area.style.position='fixed';
      area.style.opacity='0';
      document.body.appendChild(area);
      area.select();
      document.execCommand('copy');
      area.remove();
    }
    setRemoteDiagStatus('Diagnóstico copiado al portapapeles.','ok');
  }catch(_error){
    setRemoteDiagStatus('No se pudo copiar el diagnóstico.','error');
  }
}

function downloadRemoteDiagnosticsText(){
  if(!remoteDiagLastResult){
    setRemoteDiagStatus('Todavía no hay un diagnóstico para descargar.','error');
    return;
  }
  const meta=remoteDiagContextMeta();
  const safeInstance=(meta.instanceLabel||'instancia').replace(/[^a-z0-9_-]+/gi,'-').replace(/^-+|-+$/g,'')||'instancia';
  const safeName=(remoteDiagMachineName||'maquina').replace(/[^a-z0-9_-]+/gi,'-').replace(/^-+|-+$/g,'')||'maquina';
  const text=buildRemoteDiagnosticsExportText(remoteDiagLastResult);
  downloadBlob(`coffeecontrol_diag_${safeInstance}_${safeName}_${meta.timestampTag}.txt`, text, 'text/plain;charset=utf-8');
  setRemoteDiagStatus('Diagnóstico exportado a TXT.','ok');
}

async function pollRemoteDiagnostics(machineId,commandId,attempt=0){
  try{
    const d=await api('GET',`/api/machines/${machineId}/commands/${commandId}`);
    const cmd=d.command;
    if(!cmd) throw new Error('Sin estado de comando');
    if(cmd.status==='completed'){
      setRemoteDiagStatus(cmd.result?.message||`Diagnóstico recibido desde "${remoteDiagMachineName}".`,'ok');
      renderRemoteDiagnosticsResult(cmd.result||{});
      const btn=document.getElementById('mdDiagBtn');
      if(btn){btn.disabled=false;btn.textContent='Solicitar diagnóstico';}
      stopRemoteDiagnosticsPoll();
      return;
    }
    if(cmd.status==='failed'){
      setRemoteDiagStatus(cmd.result?.message||'No se pudo obtener el diagnóstico remoto.','error');
      const btn=document.getElementById('mdDiagBtn');
      if(btn){btn.disabled=false;btn.textContent='Solicitar diagnóstico';}
      stopRemoteDiagnosticsPoll();
      return;
    }
    if(attempt>=20){
      setRemoteDiagStatus('La máquina está tardando más de lo esperado en responder el diagnóstico.','error');
      const btn=document.getElementById('mdDiagBtn');
      if(btn){btn.disabled=false;btn.textContent='Solicitar diagnóstico';}
      stopRemoteDiagnosticsPoll();
      return;
    }
    remoteDiagPollTimer=setTimeout(()=>pollRemoteDiagnostics(machineId,commandId,attempt+1),2000);
  }catch(e){
    setRemoteDiagStatus('No se pudo consultar el resultado del diagnóstico remoto.','error');
    const btn=document.getElementById('mdDiagBtn');
    if(btn){btn.disabled=false;btn.textContent='Solicitar diagnóstico';}
    stopRemoteDiagnosticsPoll();
  }
}

async function requestRemoteDiagnostics(machineId){
  const btn=document.getElementById('mdDiagBtn');
  remoteDiagLastResult=null;
  setRemoteDiagExportState(false);
  if(btn){btn.disabled=true;btn.textContent='Solicitando...';}
  setRemoteDiagStatus('Pidiendo a la máquina un snapshot técnico...','info');
  stopRemoteDiagnosticsPoll();
  try{
    const d=await api('POST',`/api/machines/${machineId}/commands`,{
      type:'diagnostics_snapshot',
      payload:{limit:20}
    });
    remoteDiagCommandId=d.command?.id||null;
    if(!remoteDiagCommandId) throw new Error('No se recibió ID de comando');
    setRemoteDiagStatus('Comando enviado. Esperando respuesta de la máquina...','info');
    pollRemoteDiagnostics(machineId,remoteDiagCommandId,0);
  }catch(e){
    setRemoteDiagStatus(e.message||'No se pudo iniciar el diagnóstico remoto.','error');
    if(btn){btn.disabled=false;btn.textContent='Solicitar diagnóstico';}
    stopRemoteDiagnosticsPoll();
  }
}

async function saveMachineStockItem(stockItemId){
  const payload={
    item_id:parseInt(document.getElementById('msItemId')?.value||'',10),
    product_name:document.getElementById('msProduct')?.value||'',
    slot_label:document.getElementById('msSlot')?.value||'',
    capacity_units:parseInt(document.getElementById('msCapacity')?.value||'0',10),
    current_units:parseInt(document.getElementById('msCurrent')?.value||'0',10),
    min_units:parseInt(document.getElementById('msMin')?.value||'0',10),
    active:!!document.getElementById('msActive')?.checked,
    note:document.getElementById('msNote')?.value||''
  };
  if(!Number.isInteger(payload.item_id) || payload.item_id<0){showModalErr('msItemErr','La selección debe ser un entero mayor o igual a cero.');return;}
  if(!(payload.product_name||'').trim()){showModalErr('msItemErr','El nombre del producto es requerido.');return;}
  if(!Number.isInteger(payload.capacity_units) || payload.capacity_units<0){showModalErr('msItemErr','La capacidad debe ser un entero mayor o igual a cero.');return;}
  if(!Number.isInteger(payload.current_units) || payload.current_units<0){showModalErr('msItemErr','El stock actual debe ser un entero mayor o igual a cero.');return;}
  if(!Number.isInteger(payload.min_units) || payload.min_units<0){showModalErr('msItemErr','El mínimo de alerta debe ser un entero mayor o igual a cero.');return;}
  try{
    if(stockItemId){
      await api('PATCH',`/api/machines/${machineStockState.machineId}/stock/${stockItemId}`,payload);
    }else{
      await api('POST',`/api/machines/${machineStockState.machineId}/stock`,payload);
    }
    await openMachineStock(machineStockState.machineId,machineStockState.machineName);
  }catch(e){
    showModalErr('msItemErr',e.message);
  }
}

  }catch(e){showModalErr('meErr',e.message);}

function formatMachineTechnicalCountryCode(value){
  const parsed=Number(value);
  if(!Number.isInteger(parsed) || parsed<0) return '0x0032';
  return `0x${parsed.toString(16).toUpperCase().padStart(4,'0')}`;
}

function parseMachineTechnicalCountryCode(raw){
  const value=(raw||'').trim();
  if(!value) return null;
  if(/^0x[0-9a-f]+$/i.test(value)) return parseInt(value,16);
  if(/^\d+$/.test(value)) return parseInt(value,10);
  return null;
}

function delayMs(ms){
  return new Promise(resolve=>setTimeout(resolve,ms));
}

async function requestMachineDiagnosticsSnapshotInline(machineId){
  const start=await api('POST',`/api/machines/${machineId}/commands`,{type:'diagnostics_snapshot'});
  const commandId=start.command?.id;
  if(!commandId) throw new Error('No se recibió ID de comando para el diagnóstico.');
  for(let attempt=0;attempt<=20;attempt++){
    const d=await api('GET',`/api/machines/${machineId}/commands/${commandId}`);
    const cmd=d.command;
    if(!cmd) throw new Error('Sin estado de comando');
    if(cmd.status==='completed') return cmd.result||{};
    if(cmd.status==='failed') throw new Error(cmd.result?.message||'No se pudo obtener el diagnóstico remoto.');
    if(attempt===20) break;
    await delayMs(2000);
  }
  throw new Error('La máquina tardó demasiado en responder el diagnóstico.');
}

function machineMdbRangeContains(value,min,max){
  const num=Number(value);
  const minValue=Number(min);
  const maxValue=Number(max);
  if(!Number.isFinite(num)) return false;
  if(Number.isFinite(minValue) && num<minValue) return false;
  if(Number.isFinite(maxValue) && maxValue>0 && num>maxValue) return false;
  return true;
}

function suggestMachineTechnicalConfigFromSnapshot(current,result){
  const setup=result?.mdb||{};
  const suggested={...current};
  const notes=[];
  const changedFields=[];

  if(!setup?.seen_config && !setup?.seen_prices){
    return {
      suggested,
      changedFields,
      notes:['Todavía no hay un SETUP MDB capturado. Primero generá handshake con la máquina y volvé a intentar.']
    };
  }

  if(setup?.seen_prices){
    const min=Number(setup?.min_price);
    const max=Number(setup?.max_price);
    const currentUnits=machineHumanPriceToMdbUnits(current.price_cents, current.pricing_profile);
    const rubinoUnits=machineHumanPriceToMdbUnits(current.price_cents, 'rubino_half_credit');
    const identityUnits=machineHumanPriceToMdbUnits(current.price_cents, 'identity');
    const currentFits=machineMdbRangeContains(currentUnits,min,max);
    const rubinoFits=machineMdbRangeContains(rubinoUnits,min,max);
    const identityFits=machineMdbRangeContains(identityUnits,min,max);

    if(!currentFits){
      if(rubinoFits && !identityFits && suggested.pricing_profile!=='rubino_half_credit'){
        suggested.pricing_profile='rubino_half_credit';
        changedFields.push('Perfil MDB');
        notes.push(`Se sugiere perfil rubino_half_credit porque ${formatReportInt(rubinoUnits)} unidades MDB entran en el rango ${formatReportInt(min)}-${formatReportInt(max)}.`);
      }else if(identityFits && !rubinoFits && suggested.pricing_profile!=='identity'){
        suggested.pricing_profile='identity';
        changedFields.push('Perfil MDB');
        notes.push(`Se sugiere perfil identity porque ${formatReportInt(identityUnits)} unidades MDB entran en el rango ${formatReportInt(min)}-${formatReportInt(max)}.`);
      }else{
        notes.push(`El precio convertido actual (${formatReportInt(currentUnits)} unidades MDB) no coincide claramente con el rango ${formatReportInt(min)}-${formatReportInt(max)}; revisalo manualmente.`);
      }
    }else{
      notes.push(`El precio convertido actual (${formatReportInt(currentUnits)} unidades MDB) ya cae dentro del rango ${formatReportInt(min)}-${formatReportInt(max)}.`);
    }
  }

  if(setup?.seen_config){
    const vmcLevel=Number(setup?.vmc_level);
    if(Number.isFinite(vmcLevel)){
      if(suggested.mdb_feature_level>vmcLevel){
        suggested.mdb_feature_level=vmcLevel;
        changedFields.push('Feature level');
        notes.push(`Se sugiere bajar feature level a ${formatReportInt(vmcLevel)} para no anunciar más que el level detectado en el VMC.`);
      }else if(suggested.mdb_feature_level<vmcLevel){
        notes.push(`El VMC anunció level ${formatReportInt(vmcLevel)} y el lector quedó en feature ${formatReportInt(suggested.mdb_feature_level)}. Se mantiene así por compatibilidad conservadora.`);
      }else{
        notes.push(`El feature level ya coincide con el level detectado en el VMC (${formatReportInt(vmcLevel)}).`);
      }
    }
  }

  if(!Number.isInteger(suggested.mdb_scale_factor) || suggested.mdb_scale_factor<=0){
    suggested.mdb_scale_factor=100;
    changedFields.push('Scale factor');
    notes.push('Se normalizó scale factor a 100.');
  }
  if(!Number.isInteger(suggested.mdb_decimal_places) || suggested.mdb_decimal_places<0){
    suggested.mdb_decimal_places=2;
    changedFields.push('Decimal places');
    notes.push('Se normalizó decimal places a 2.');
  }
  if(!Number.isInteger(suggested.mdb_max_response_time) || suggested.mdb_max_response_time<=0){
    suggested.mdb_max_response_time=5;
    changedFields.push('Max response time');
    notes.push('Se normalizó max response time a 5.');
  }

  return {
    suggested,
    changedFields:[...new Set(changedFields)],
    notes
  };
}

async function suggestMachineTechnicalConfig(id){
  const machineState=(allMachines||[]).find(m=>Number(m.id)===Number(id))||{};
  if(!machineState?.online){
    setMachineTechnicalSuggestStatus('La máquina está offline. El modo asistido necesita un snapshot remoto para comparar el último SETUP MDB.','warn');
    return;
  }
  const btn=document.getElementById('mtSuggestBtn');
  try{
    if(btn){btn.disabled=true;btn.textContent='Sugiriendo...';}
    setMachineTechnicalSuggestStatus('Pidiendo un snapshot remoto a la máquina para comparar el último SETUP MDB...','info');
    const current=readMachineTechnicalConfigForm();
    const result=await requestMachineDiagnosticsSnapshotInline(id);
    const suggestion=suggestMachineTechnicalConfigFromSnapshot(current,result);
    if(suggestion.changedFields.length){
      writeMachineTechnicalConfigForm(suggestion.suggested);
      setMachineTechnicalSuggestStatus(`Se precargaron sugerencias en: ${suggestion.changedFields.join(', ')}. ${suggestion.notes.join(' ')}`,'ok');
    }else{
      setMachineTechnicalSuggestStatus(`No hizo falta cambiar valores. ${suggestion.notes.join(' ')}`,'info');
    }
  }catch(e){
    setMachineTechnicalSuggestStatus(e.message||'No se pudo calcular la sugerencia asistida.','error');
  }finally{
    if(btn){btn.disabled=false;btn.textContent='Sugerir según último SETUP MDB';}
  }
}

async function saveMachineTechnicalConfig(id){
  const price=parseInt(document.getElementById('mtPrice')?.value||'0',10);
  const feature=parseInt(document.getElementById('mtFeature')?.value||'',10);
  const country=parseMachineTechnicalCountryCode(document.getElementById('mtCountry')?.value||'');
  const scale=parseInt(document.getElementById('mtScale')?.value||'',10);
  const decimals=parseInt(document.getElementById('mtDecimals')?.value||'',10);
  const responseTime=parseInt(document.getElementById('mtResp')?.value||'',10);
  const misc=parseInt(document.getElementById('mtMisc')?.value||'',10);
  const profile=document.getElementById('mtProfile')?.value||'';

  if(!Number.isInteger(price) || price<=0){showModalErr('mtErr','El precio humano debe ser un entero mayor a cero.');return;}
  if(!['rubino_half_credit','identity'].includes(profile)){showModalErr('mtErr','El perfil MDB es inválido.');return;}
  if(!Number.isInteger(feature) || feature<0 || feature>255){showModalErr('mtErr','Feature level fuera de rango (0-255).');return;}
  if(!Number.isInteger(country) || country<0 || country>65535){showModalErr('mtErr','Country code MDB inválido. Usá decimal o formato 0xNNNN.');return;}
  if(!Number.isInteger(scale) || scale<0 || scale>255){showModalErr('mtErr','Scale factor fuera de rango (0-255).');return;}
  if(!Number.isInteger(decimals) || decimals<0 || decimals>255){showModalErr('mtErr','Decimal places fuera de rango (0-255).');return;}
  if(!Number.isInteger(responseTime) || responseTime<0 || responseTime>255){showModalErr('mtErr','Max response time fuera de rango (0-255).');return;}
  if(!Number.isInteger(misc) || misc<0 || misc>255){showModalErr('mtErr','Misc options fuera de rango (0-255).');return;}

  try{
    const d=await api('PATCH',`/api/machines/${id}/technical-config`,{
      price_cents:price,
      pricing_profile:profile,
      mdb_feature_level:feature,
      mdb_country_code:`0x${country.toString(16).toUpperCase().padStart(4,'0')}`,
      mdb_scale_factor:scale,
      mdb_decimal_places:decimals,
      mdb_max_response_time:responseTime,
      mdb_misc_options:misc
    });
    closeModal();
    loadMachines();
    if(d.config_sync==='queued'){
      alert('Configuración técnica actualizada. La sincronización remota quedó encolada para esta máquina.');
    }else if(d.config_sync==='pending_reconnect'){
      alert('Configuración técnica actualizada. La máquina está offline; se aplicará al reconectarse.');
    }else if(d.config_sync==='queued_command_exists'){
      alert('Configuración técnica actualizada. Ya había otro comando pendiente; si no llega una sincronización remota, la máquina tomará esta configuración al reconectarse.');
    }else{
      alert('Configuración técnica actualizada.');
    }
  }catch(e){showModalErr('mtErr',e.message);}
}

function applyEmployeeFilters(){

function renderEmployeeCardActions(empId,card){
  const status=nfcCardStatus(card);
  const safeUid=(card.uid||'').replace(/'/g,'&#39;');
  const safeLabel=(card.label||'').replace(/"/g,'&quot;');
  const actions=[
    `<button class="btn btn-ghost btn-xs" onclick="renameCard(${empId},${card.id},this)" data-label="${safeLabel}">Renombrar</button>`,
    `<button class="btn btn-ghost btn-xs" onclick="reassignCard(${card.id},'${safeUid}')">Reasignar</button>`
  ];
  if(status==='active'){
    actions.push(`<button class="btn btn-ghost btn-xs" style="color:var(--txw)" onclick="setEmployeeCardStatus(${empId},${card.id},'lost')">Marcar perdido</button>`);
    actions.push(`<button class="btn btn-ghost btn-xs" style="color:var(--txd)" onclick="setEmployeeCardStatus(${empId},${card.id},'inactive')">Dar de baja</button>`);
  }else if(status==='lost'){
    actions.push(`<button class="btn btn-ghost btn-xs" onclick="setEmployeeCardStatus(${empId},${card.id},'active')">Reactivar</button>`);
    actions.push(`<button class="btn btn-ghost btn-xs" style="color:var(--txd)" onclick="setEmployeeCardStatus(${empId},${card.id},'inactive')">Dar de baja</button>`);
  }else{
    actions.push(`<button class="btn btn-ghost btn-xs" onclick="setEmployeeCardStatus(${empId},${card.id},'active')">Reactivar</button>`);
  }
  return actions.join('');
}

async function setEmployeeCardStatus(empId,cardId,status){
  const actionLabel=status==='lost'
    ? 'marcar como perdido'
    : status==='inactive'
      ? 'dar de baja'

  if(status!=='active' && !confirm(`¿Querés ${actionLabel} este TAG NFC?`)) return;
  try{
    await api('PATCH',`/api/employees/${empId}/cards/${cardId}`,{status});
    await refreshEmployeesCache();
    showEmployeeDetail(empId);
  }catch(e){alert('Error: '+e.message);}
}

function formatDateInputLocal(value){
  const d=value?new Date(value):new Date();
  const year=d.getFullYear();
  const month=String(d.getMonth()+1).padStart(2,'0');
  const day=String(d.getDate()).padStart(2,'0');
  return `${year}-${month}-${day}`;
}

function defaultReportRange(){
  const now=new Date();
  return {
    from: formatDateInputLocal(new Date(now.getFullYear(),now.getMonth(),1)),
    to: formatDateInputLocal(now)
  };
}

function normalizeReportFilters(filters){
  const defaults=defaultReportRange();
  const current=filters||{};
  const previous=reportState.filters||{};
  return {
    from: current.from||reportState.from||defaults.from,
    to: current.to||reportState.to||defaults.to,
    department: String(current.department ?? previous.department ?? '').trim(),
    employee_search: String(current.employee_search ?? current.employeeSearch ?? previous.employee_search ?? '').trim(),
    access_level_id: String(current.access_level_id ?? current.accessLevelId ?? previous.access_level_id ?? '').trim()
  };
}

function reportBuildQueryString(params){
  const query=new URLSearchParams();
  Object.entries(params||{}).forEach(([key,value])=>{
    if(value===undefined||value===null||value==='') return;
    query.set(key,String(value));
  });
  const qs=query.toString();
  return qs?`?${qs}`:'';
}

function sanitizeDownloadName(value){
  return String(value||'reporte')
    .normalize('NFD')
    .replace(/[\u0300-\u036f]/g,'')
    .replace(/[^\w.-]+/g,'_')
    .replace(/^_+|_+$/g,'')
    .toLowerCase() || 'reporte';
}

function reportFormFilters(){
  return {
    from: document.getElementById('repFrom')?.value||'',
    to: document.getElementById('repTo')?.value||'',
    department: document.getElementById('repDepartment')?.value||'',
    employee_search: document.getElementById('repEmployeeSearch')?.value||'',
    access_level_id: document.getElementById('repAccessLevel')?.value||''
  };
}

function reportFilterSummary(filters=reportState.filters||{}){
  const current=filters||{};
  const parts=[];
  if(current.department) parts.push(`Área: ${current.department}`);
  if(current.access_level_id){
    parts.push(`Jerarquía: ${current.access_level_id==='manual'?'Manual / sin jerarquía':accessLevelDisplayName({access_level_id:current.access_level_id})}`);
  }
  if(current.employee_search) parts.push(`Empleado: ${current.employee_search}`);
  return parts.join(' · ');
}

function reportQueryString(extraParams={}){
  const base=normalizeReportFilters(reportFormFilters());
  return reportBuildQueryString({...base,...extraParams});
}

function formatReportMoney(cents){
  return '$'+Math.round(Number(cents)||0).toLocaleString('es-AR');
}

function formatReportInt(value){
  return (Number(value)||0).toLocaleString('es-AR');
}

function formatReportRangeLabel(from,to){
  if(!from||!to) return 'rango actual';
  const fromText=new Date(from+'T00:00:00').toLocaleDateString('es-AR');
  const toText=new Date(to+'T00:00:00').toLocaleDateString('es-AR');
  return from===to ? fromText : `${fromText} a ${toText}`;
}

  ].map(([label,value])=>`<div class="metric"><div class="mlbl">${label}</div><div class="mval">${value}</div></div>`).join('');
}

function exportCsv(filename, columns, rows){
  const header=columns.map(col=>`"${String(col.label).replace(/"/g,'""')}"`).join(',');
  const body=(rows||[]).map(row=>columns.map(col=>{
    const value=typeof col.value==='function'?col.value(row):row[col.value];
    return `"${String(value??'').replace(/"/g,'""')}"`;
  }).join(',')).join('\r\n');
  const csv='\uFEFF'+header+'\r\n'+body;
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const link=document.createElement('a');
  link.href=url;
  link.download=filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function reportSectionValue(row,column){
  return typeof column.value==='function' ? column.value(row) : row?.[column.value];
}

function reportSectionDisplayValue(row,column){
  const raw=reportSectionValue(row,column);
  if(raw===null || raw===undefined || raw==='') return '';
  if(column.type==='currency') return formatReportMoney(raw);
  if(column.type==='number') return formatReportInt(raw);
  if(column.type==='datetime'){
    const dt=new Date(raw);
    return Number.isNaN(dt.getTime()) ? String(raw) : dt.toLocaleString('es-AR');
  }
  return String(raw);
}

function reportSectionExcelValue(row,column){
  const raw=reportSectionValue(row,column);
  if(raw===null || raw===undefined || raw==='') return '';
  if(column.type==='currency'){
    const amount=Number(raw);
    return Number.isFinite(amount) ? amount : '';
  }
  if(column.type==='number'){
    const num=Number(raw);
    return Number.isFinite(num) ? num : '';
  }
  if(column.type==='datetime'){
    const dt=new Date(raw);
    return Number.isNaN(dt.getTime()) ? String(raw) : dt;
  }
  return raw;
}

function reportSectionColumnWidth(column, rows){
  const width=(rows||[]).reduce((max,row)=>{
    const display=reportSectionDisplayValue(row,column);
    return Math.max(max, String(display).length);
  }, column.label.length);
  return Math.min(Math.max(width+2,12), column.maxWidth||36);
}

function reportSectionHighlights(section, rows){
  const sum=(key)=>(rows||[]).reduce((acc,row)=>acc+(Number(row?.[key])||0),0);

      ['Cafés aprobados', formatReportInt(sum('taps_count'))],

      ['Líder del rango', top ? `${top.name} (${formatReportInt(top.taps_count)} cafés)` : '—']
    ];
  }
  if(section==='employees'){
    return [
      ['Empleados listados', formatReportInt(rows.length)],
      ['Cafés aprobados', formatReportInt(sum('taps_count'))],
      ['Importe total', formatReportMoney(sum('spent_cents'))],
      ['Mayor consumo', top ? `${top.name} (${formatReportInt(top.taps_count)} cafés)` : '—']
    ];
  }
  if(section==='departments'){
    return [
      ['Áreas listadas', formatReportInt(rows.length)],
      ['Cafés aprobados', formatReportInt(sum('taps_count'))],
      ['Importe total', formatReportMoney(sum('spent_cents'))],
      ['Área líder', top ? `${top.department||'Sin área'} (${formatReportInt(top.taps_count)} cafés)` : '—']
    ];

  if(section==='stock_items'){
    const summary=reportState.stock?.summary||{};

    return [

    ];

  if(section==='stock_movements'){

      ['Movimientos listados', formatReportInt(rows.length)],
      ['Ventas del rango', formatReportInt(summary.sales_units)],

    ['Cafés aprobados', formatReportInt(sum('approved_taps'))],
    ['Intentos rechazados', formatReportInt(sum('denied_taps'))],

function buildExcelSectionSheet(workbook, section){
  const config=getReportSectionConfig(section);
  const rows=config.rows();
  const worksheet=workbook.addWorksheet(sanitizeSheetName(config.sheetName),{
    views:[{showGridLines:false}]
  });
  worksheet.columns=excelSectionColumns(config.columns,rows);
  styleExcelTitle(worksheet,config.title,config.columns.length);

  const highlights=reportSectionHighlights(section,rows);
  const fillPalette=['FFE8F4FF','FFF5F7FF','FFEFFBF6','FFFFF6E8'];
  const leftEnd=Math.max(Math.floor(config.columns.length/2),2);
  const rightStart=Math.min(leftEnd+1,config.columns.length);
  highlights.forEach((item,index)=>{
    const startCol=index%2===0 ? 1 : rightStart;
    const endCol=index%2===0 ? leftEnd : config.columns.length;
    const startRow=index<2 ? 4 : 7;
    styleExcelCard(worksheet,startRow,startCol,startRow+1,endCol,item[0],item[1],fillPalette[index]);
  });

  const nextRow=addExcelChart(workbook,worksheet,config.chartId,10);
  const headerRowIndex=Math.max(nextRow+1,24);
  const headerRow=worksheet.getRow(headerRowIndex);
  config.columns.forEach((column,index)=>{
    headerRow.getCell(index+1).value=column.label;
  });

  if(rows.length){
    rows.forEach(row=>{
      const values=config.columns.map(column=>reportSectionExcelValue(row,column));
      worksheet.addRow(values);
    });
  }else{

function buildDetailSummarySheet(workbook, title, cards, details){
  const worksheet=workbook.addWorksheet(sanitizeSheetName('Resumen'),{
    views:[{showGridLines:false}]
  });
  worksheet.columns=[{width:24},{width:24},{width:24},{width:24}];
  styleExcelTitle(worksheet,title,4);

  const fills=['FFE8F4FF','FFF5F7FF','FFEFFBF6','FFFFF6E8'];
  const ranges=[
    [4,1,5,2],
    [4,3,5,4],
    [7,1,8,2],
    [7,3,8,4]
  ];
  cards.slice(0,4).forEach((card,index)=>{
    const range=ranges[index];
    styleExcelCard(worksheet,range[0],range[1],range[2],range[3],card[0],card[1],fills[index]);
  });

  worksheet.getCell('A10').value='Detalle';
  worksheet.getCell('A10').font={name:'Segoe UI',size:12,bold:true,color:{argb:'FF243241'}};
  details.forEach((item,index)=>{
    const row=11+index;
    worksheet.getCell(`A${row}`).value=item[0];
    worksheet.getCell(`A${row}`).font={name:'Segoe UI',size:10,bold:true,color:{argb:'FF445366'}};
    worksheet.getCell(`B${row}`).value=item[1];
  });
  return worksheet;
}

function buildDetailTableSheet(workbook, sheetName, title, columns, rows){
  const worksheet=workbook.addWorksheet(sanitizeSheetName(sheetName),{
    views:[{showGridLines:false}]
  });
  worksheet.columns=excelSectionColumns(columns,rows);
  styleExcelTitle(worksheet,title,columns.length);
  const headerRowIndex=4;
  const headerRow=worksheet.getRow(headerRowIndex);
  columns.forEach((column,index)=>{
    headerRow.getCell(index+1).value=column.label;
  });
  if(rows.length){
    rows.forEach(row=>{
      worksheet.addRow(columns.map(column=>reportSectionExcelValue(row,column)));
    });
  }else{
    const emptyRow=worksheet.addRow(['Sin datos']);
    if(columns.length>1) worksheet.mergeCells(emptyRow.number,1,emptyRow.number,columns.length);
  }
  styleExcelTable(worksheet,headerRowIndex,columns,rows);
}

function downloadBlob(filename, blob, mimeType='application/octet-stream'){
  const finalBlob = blob instanceof Blob ? blob : new Blob([blob], { type: mimeType });
  const url=URL.createObjectURL(finalBlob);
  const link=document.createElement('a');
  link.href=url;
  link.download=filename;
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
}

function pdfTableHtml(columns, rows){
  const header=columns.map(col=>`<th>${escHtml(col.label)}</th>`).join('');
  const body=(rows||[]).map(row=>`<tr>${columns.map(col=>{
    const value=typeof col.value==='function'?col.value(row):row[col.value];
    return `<td>${escHtml(value)}</td>`;
  }).join('')}</tr>`).join('');
  return `<table><thead><tr>${header}</tr></thead><tbody>${body||`<tr><td colspan="${columns.length}">Sin datos</td></tr>`}</tbody></table>`;
}

  if(!fromInput||!toInput) return;
  const today=new Date();
  let from=new Date(today.getFullYear(),today.getMonth(),1);
  let to=new Date(today);
  if(preset==='today'){
    from=new Date(today);
  }else if(preset==='7d'){
    from=new Date(today);
    from.setDate(from.getDate()-6);
  }else if(preset==='30d'){
    from=new Date(today);
    from.setDate(from.getDate()-29);
  }
  fromInput.value=formatDateInputLocal(from);
  toInput.value=formatDateInputLocal(to);
  applyReportFilters();
}

function applyReportFilters(){
  const filters=normalizeReportFilters(reportFormFilters());
  const {from,to,department,employee_search,access_level_id}=filters;
  if(!from||!to){
    alert('Elegí una fecha desde y hasta.');
    return;
  }
  loadReports({from,to,department,employee_search,access_level_id});
}

function clearReportFilters(){
  const department=document.getElementById('repDepartment');
  const employeeSearch=document.getElementById('repEmployeeSearch');
  const accessLevel=document.getElementById('repAccessLevel');
  if(department) department.value='';
  if(employeeSearch) employeeSearch.value='';
  if(accessLevel) accessLevel.value='';
  applyReportFilters();
}

function destroyReportCharts(){
  [reportTrendChart,reportMachinesChart,reportEmployeesChart,reportDepartmentsChart,reportStockChart].forEach(chart=>{ if(chart) chart.destroy(); });
  reportTrendChart=null;
  reportMachinesChart=null;
  reportEmployeesChart=null;
  reportDepartmentsChart=null;
  reportStockChart=null;
}

function chartPalette(size){
  return Array.from({length:size},(_,i)=>REPORT_CHART_COLORS[i%REPORT_CHART_COLORS.length]);
}

function renderReportCharts(){
  destroyReportCharts();
  const trendCanvas=document.getElementById('repTrendChart');
  const machinesCanvas=document.getElementById('repMachinesChart');
  const employeesCanvas=document.getElementById('repEmployeesChart');
  const departmentsCanvas=document.getElementById('repDepartmentsChart');
  const stockCanvas=document.getElementById('repStockChart');
  if(trendCanvas&&Array.isArray(reportState.overview?.by_day)){
    const labels=reportState.overview.by_day.map(row=>new Date(row.business_date+'T00:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'2-digit'}));
    const approved=reportState.overview.by_day.map(row=>Number(row.approved_taps)||0);
    const denied=reportState.overview.by_day.map(row=>Number(row.denied_taps)||0);
    reportTrendChart=new Chart(trendCanvas,{
      type:'line',
      data:{
        labels,
        datasets:[
          {label:'Aprobados',data:approved,borderColor:'#2FBF71',backgroundColor:'rgba(47,191,113,.14)',fill:true,tension:.28},
          {label:'Rechazados',data:denied,borderColor:'#E24B4A',backgroundColor:'rgba(226,75,74,.08)',fill:true,tension:.28}
        ]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        plugins:{legend:{position:'bottom'}},
        scales:{x:{grid:{display:false}},y:{beginAtZero:true}}
      }
    });
  }
  if(machinesCanvas){
    const items=reportState.machines.slice(0,8);
    reportMachinesChart=new Chart(machinesCanvas,{
      type:'bar',
      data:{
        labels:items.map(row=>row.name),
        datasets:[{label:'Cafés',data:items.map(row=>Number(row.taps_count)||0),backgroundColor:chartPalette(items.length),borderRadius:6,borderSkipped:false}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{beginAtZero:true}}}
    });
  }
  if(employeesCanvas){
    const items=reportState.employees.slice(0,8);
    reportEmployeesChart=new Chart(employeesCanvas,{
      type:'bar',
      data:{
        labels:items.map(row=>row.name),
        datasets:[{label:'Cafés',data:items.map(row=>Number(row.taps_count)||0),backgroundColor:chartPalette(items.length),borderRadius:6,borderSkipped:false}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false}},y:{beginAtZero:true}}}
    });
  }
  if(departmentsCanvas){
    const items=reportState.departments.filter(row=>(Number(row.spent_cents)||0)>0).slice(0,8);
    reportDepartmentsChart=new Chart(departmentsCanvas,{
      type:'doughnut',
      data:{
        labels:items.map(row=>row.department),
        datasets:[{data:items.map(row=>Number(row.spent_cents)||0),backgroundColor:chartPalette(items.length)}]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}
    });
  }
  if(stockCanvas){
    const severity=(item)=>{
      if(item.status==='empty') return 0;
      if(item.status==='low') return 1;
      if(item.status==='ok') return 2;
      return 3;
    };
    const items=(reportState.stock?.items||[])
      .filter(item=>item.active)
      .sort((a,b)=>{
        const diff=severity(a)-severity(b);
        if(diff!==0) return diff;
        return (Number(a.fill_pct)||0)-(Number(b.fill_pct)||0);
      })
      .slice(0,8);
    reportStockChart=new Chart(stockCanvas,{
      type:'bar',
      data:{
        labels:items.map(row=>`${row.machine_name} · #${row.item_id} ${row.product_name}`),
        datasets:[{
          label:'Ocupación',
          data:items.map(row=>Number(row.fill_pct)||0),
          backgroundColor:items.map(row=>row.status==='empty' ? 'rgba(226,75,74,.82)' : row.status==='low' ? 'rgba(245,166,35,.82)' : 'rgba(47,191,113,.82)'),
          borderRadius:6,
          borderSkipped:false
        }]
      },
      options:{
        indexAxis:'y',
        responsive:true,
        maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{
          x:{beginAtZero:true,max:100,ticks:{callback:value=>`${value}%`}},
          y:{grid:{display:false}}
        }
      }
    });
  }
}

async function loadReports(customFilters){
  render('<div class="page-title">Reportes</div><div class="empty">Cargando...</div>');
  try{
    await refreshAccessLevelsCache(isManagerRole());
    const filters=normalizeReportFilters(customFilters);
    const sharedQuery=reportBuildQueryString({
      from: filters.from,
      to: filters.to,
      department: filters.department,
      access_level_id: filters.access_level_id
    });
    const employeesQuery=reportBuildQueryString({
      from: filters.from,
      to: filters.to,
      department: filters.department,
      employee_search: filters.employee_search,
      access_level_id: filters.access_level_id
    });
    const departmentOptionsQuery=reportBuildQueryString({
      from: filters.from,
      to: filters.to,
      access_level_id: filters.access_level_id
    });
    const requests=[
      api('GET',`/api/reports/overview${sharedQuery}`),
      api('GET',`/api/reports/machines${sharedQuery}`),
      api('GET',`/api/reports/employees${employeesQuery}`),
      api('GET',`/api/reports/departments${sharedQuery}`),
      api('GET',`/api/reports/departments${departmentOptionsQuery}`),
    ];
    if(isManagerRole()) requests.push(api('GET',`/api/reports/stock${sharedQuery}`));
    const [overview,machines,employees,departments,departmentOptions,stock]=await Promise.all(requests);
    const selectedDepartment=filters.department||'';
    const allDepartments=Array.from(new Set([
      ...((departmentOptions.departments||[]).map(item=>item.department||'Sin área')),
      ...(selectedDepartment ? [selectedDepartment] : [])
    ])).sort((a,b)=>a.localeCompare(b,'es',{sensitivity:'base'}));
    reportState={
      from: overview.from||filters.from,
      to: overview.to||filters.to,
      filters: {
        department: selectedDepartment,
        employee_search: filters.employee_search||'',
        access_level_id: filters.access_level_id||''
      },
      overview,
      machines: machines.machines||[],
      employees: employees.employees||[],
      departments: departments.departments||[],
      stock: isManagerRole() ? (stock||null) : null,
      departmentOptions: allDepartments,
      accessLevelOptions: accessLevelCache.slice()
    };
    renderReports();
  }catch(e){render('<p style="color:var(--txd)">'+e.message+'</p>');}
}

let liveItems=[];

async function loadLive(){
  render(`
  <div class="topbar">
    <div class="page-title">Feed en vivo</div>
    <button class="btn btn-ghost btn-sm" onclick="clearLiveView()" style="margin-left:auto;color:var(--txd)">Limpiar vista</button>
  </div>
  <div class="card">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;padding-bottom:14px;border-bottom:1px solid var(--br)">
      <div style="display:flex;flex-direction:column;gap:3px">
        <label style="font-size:11px;color:var(--tx3)">Estado</label>
        <select id="lfStatus" onchange="renderLive()" style="font-size:12px;padding:5px 8px;border:1px solid var(--br);border-radius:var(--r);background:var(--bg2)">
          <option value="">Todos</option>
          <option value="approved">✓ Aprobados</option>
          <option value="denied">✕ Rechazados</option>
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px">
        <label style="font-size:11px;color:var(--tx3)">Máquina</label>
        <select id="lfMachine" onchange="renderLive()" style="font-size:12px;padding:5px 8px;border:1px solid var(--br);border-radius:var(--r);background:var(--bg2)">
          <option value="">Todas</option>
        </select>
      </div>
      <div style="display:flex;flex-direction:column;gap:3px">
        <label style="font-size:11px;color:var(--tx3)">Empleado</label>
        <input id="lfEmp" oninput="renderLive()" placeholder="Buscar nombre…" style="font-size:12px;padding:5px 8px;border:1px solid var(--br);border-radius:var(--r);background:var(--bg2);width:140px">
      </div>
      <div style="display:flex;flex-direction:column;gap:3px">
        <label style="font-size:11px;color:var(--tx3)">Motivo rechazo</label>
        <select id="lfReason" onchange="renderLive()" style="font-size:12px;padding:5px 8px;border:1px solid var(--br);border-radius:var(--r);background:var(--bg2)">
          <option value="">Todos</option>
          <option value="limit_reached">Límite alcanzado</option>
          <option value="card_unknown">Tarjeta desconocida</option>
          <option value="inactive">Empleado inactivo</option>
        </select>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="resetLiveFilters()" style="align-self:flex-end">Limpiar filtros</button>
    </div>
    <div id="liveBox"><div class="empty">Cargando...</div></div>
  </div>`);
  try{
    const d=await api('GET','/api/dashboard/feed');
    liveItems=d.taps||[];
    updateLiveMachineFilter();
    renderLive();
  }catch(e){
    const el=document.getElementById('liveBox');
    if(el) el.innerHTML='<div style="color:var(--txd)">'+e.message+'</div>';
  }
}

function updateLiveMachineFilter(){
  const sel=document.getElementById('lfMachine');
  if(!sel) return;
  const current=sel.value;
  const machines=[...new Set(liveItems.map(t=>t.machine_name).filter(Boolean))].sort();
  sel.innerHTML='<option value="">Todas</option>'+machines.map(m=>`<option value="${m}"${m===current?' selected':''}>${m}</option>`).join('');
}

function renderLive(){
  const el=document.getElementById('liveBox');
  if(!el) return;

  const status  = document.getElementById('lfStatus')?.value  || '';
  const machine = document.getElementById('lfMachine')?.value || '';
  const emp     = (document.getElementById('lfEmp')?.value    || '').toLowerCase().trim();
  const reason  = document.getElementById('lfReason')?.value  || '';

  let items=liveItems;
  if(status==='approved') items=items.filter(t=> t.approved);
  if(status==='denied')   items=items.filter(t=>!t.approved);
  if(machine)             items=items.filter(t=>t.machine_name===machine);
  if(emp)                 items=items.filter(t=>(t.employee_name||'').toLowerCase().includes(emp)||(t.nfc_uid||'').toLowerCase().includes(emp));
  if(reason)              items=items.filter(t=>t.deny_reason===reason);

  const hasFilter=status||machine||emp||reason;
  if(!items.length){
    el.innerHTML=`<div class="empty">Sin registros${hasFilter?' que coincidan con los filtros':' hoy'}.</div>`;
    return;
  }

  el.innerHTML=items.map(t=>{
    const ok=t.approved;
    const col=ok?'var(--txs)':'var(--txd)';
    const hora=new Date(t.tapped_at).toLocaleString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit',day:'numeric',month:'short'});
    return `<div style="display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--br)">
      <span style="font-weight:500;font-size:12px;color:${col};width:14px;flex-shrink:0">${ok?'✓':'✕'}</span>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:500">${t.employee_name||'Desconocido'}</div>
        <div style="font-size:11px;color:var(--tx3)">${t.machine_name}${t.deny_reason?' · '+t.deny_reason:''}</div>
        ${t.nfc_uid?`<div style="font-size:10px;color:var(--tx3);font-family:monospace;margin-top:1px">${t.nfc_uid}</div>`:''}
      </div>
      <div style="text-align:right;flex-shrink:0">
        <div style="font-size:12px;color:${col}">${ok&&t.amount_cents?formatReportMoney(t.amount_cents):ok?'OK':'Rechazado'}</div>
        <div style="font-size:10px;color:var(--tx3)">${hora}</div>
      </div>
    </div>`;
  }).join('');
}

function resetLiveFilters(){
  ['lfStatus','lfMachine','lfReason'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
  const ef=document.getElementById('lfEmp');if(ef)ef.value='';
  renderLive();
}

function clearLiveView(){
  liveItems=[];
  renderLive();
}

function prependLive(msg){
  if(!['tap_approved','tap_denied','card_unknown'].includes(msg.event)) return;
  liveItems.unshift({
    employee_name: msg.employee||null,
    nfc_uid:       msg.uid||null,
    machine_name:  msg.machine||'—',
    approved:      msg.event==='tap_approved',
    deny_reason:   msg.event==='card_unknown'?'card_unknown':msg.event==='tap_denied'?'limit_reached':null,
    tapped_at:     new Date().toISOString()
  });
  if(liveItems.length>100) liveItems.pop();
  updateLiveMachineFilter();
  renderLive();
}

let unknownCards=[];

// ── helpers localStorage para UIDs descartados ──────
function getDiscarded(){
  try{ return new Set(JSON.parse(localStorage.getItem('cc_discarded_uids')||'[]')); }
  catch(_){ return new Set(); }
}
function saveDiscarded(set){
  localStorage.setItem('cc_discarded_uids', JSON.stringify([...set]));
}
function addDiscarded(uid){
  const s=getDiscarded(); s.add(uid); saveDiscarded(s);
}
function removeDiscarded(uid){
  const s=getDiscarded(); s.delete(uid); saveDiscarded(s);
}

// Precarga los UIDs desconocidos de DB al iniciar la app (para el badge)
async function loadUnknownBadge(){
  try{
    const d=await api('GET','/api/dashboard/unknown-uids');
    const discarded=getDiscarded();
    (d.uids||[]).forEach(u=>{
      if(discarded.has(u.uid)) return; // descartado por el usuario
      if(!unknownCards.find(c=>c.uid===u.uid)){
        unknownCards.push({uid:u.uid,machine:u.machine||'—',machine_id:u.machine_id,ts:u.ts});
      }
    });
    const badge=document.getElementById('unknownBadge');
    if(badge){
      if(unknownCards.length>0){badge.textContent=unknownCards.length;badge.style.display='';}
      else badge.style.display='none';
    }
  }catch(e){console.warn('loadUnknownBadge:',e.message);}
}

function handleUnknownCard(msg){
  // Si la tarjeta fue descartada, el nuevo tap del ESP la "reactiva"
  removeDiscarded(msg.uid);
  if(unknownCards.find(c=>c.uid===msg.uid)) return;
  unknownCards.unshift({uid:msg.uid,machine:msg.machine||'—',machine_id:msg.machine_id,ts:new Date().toISOString()});
  const badge=document.getElementById('unknownBadge');
  if(badge){badge.textContent=unknownCards.length;badge.style.display='';}
  if(currentPage==='unknown') renderUnknownCards();
}

async function loadUnknown(){
  try{
    const d=await api('GET','/api/dashboard/unknown-uids');
    const discarded=getDiscarded();
    // Mezclar: los de DB que no estén descartados ni ya en memoria
    (d.uids||[]).forEach(u=>{
      if(discarded.has(u.uid)) return;
      if(!unknownCards.find(c=>c.uid===u.uid)){
        unknownCards.push({uid:u.uid,machine:u.machine||'—',machine_id:u.machine_id,ts:u.ts});
      }
    });
    const badge=document.getElementById('unknownBadge');
    if(badge){
      if(unknownCards.length>0){badge.textContent=unknownCards.length;badge.style.display='';}
      else badge.style.display='none';
    }
  }catch(e){console.warn('Error cargando UIDs desconocidos:',e.message);}
  renderUnknownCards();
}

function renderUnknownCards(){
  if(!unknownCards.length){
    render(`<div class="topbar"><div class="page-title">NFCs sin asignar</div></div>
    <div class="card"><div class="empty">Sin NFCs sin asignar detectados.<br><small style="color:var(--tx3)">Cuando alguien acerque un TAG NFC sin asignar, aparecerá aquí en tiempo real.</small></div></div>`);
    return;
  }
  const rows=unknownCards.map(c=>`<tr>
    <td style="font-family:monospace;font-size:12px">${c.uid}</td>
    <td>${c.machine}</td>
    <td style="color:var(--tx3);font-size:12px">${timeSince(c.ts)}</td>
    <td style="display:flex;gap:6px;flex-wrap:wrap">
      <button class="btn btn-primary btn-xs" onclick="openAssignModal('${c.uid}')">Asignar</button>
      <button class="btn btn-ghost btn-xs" onclick="showUidHistory('${c.uid}')">Ver intentos</button>
      <button class="btn btn-ghost btn-xs" style="color:var(--txd)" onclick="discardUnknownCard('${c.uid}')">Descartar</button>
    </td>
  </tr>`).join('');
  render(`<div class="topbar"><div class="page-title">NFCs sin asignar</div></div>
  <div class="card">
    <p style="font-size:13px;color:var(--tx2);margin-bottom:16px">Estos TAGs NFC fueron acercados pero no tienen empleado asignado. Asignales un empleado para habilitarlos.</p>
    <table><thead><tr><th>UID</th><th>Máquina</th><th>Detectada</th><th>Acciones</th></tr></thead><tbody>${rows}</tbody></table>
  </div>`);
}

function discardUnknownCard(uid){
  addDiscarded(uid); // persiste en localStorage
  unknownCards=unknownCards.filter(c=>c.uid!==uid);
  const badge=document.getElementById('unknownBadge');
  if(badge){
    if(unknownCards.length===0) badge.style.display='none';
    else badge.textContent=unknownCards.length;
  }
  if(currentPage==='unknown') renderUnknownCards();
}

  try{

    }).join('');

       <table><thead><tr><th>Máquina</th><th>Resultado</th><th>Fecha/hora</th></tr></thead>

async function openAssignModal(uid){
  const d=await api('GET','/api/employees');
  const opts=(d.employees||[]).map(e=>`<option value="${e.id}">${e.name}</option>`).join('');
  openModal('Asignar tarjeta NFC',`
    <p style="font-size:13px;color:var(--tx2);margin-bottom:12px">UID: <code style="font-family:monospace;background:var(--bg2);padding:2px 6px;border-radius:4px">${uid}</code></p>
    <label>Empleado</label>
    <select id="assignEmpId" style="width:100%;padding:8px;border:1px solid var(--br);border-radius:var(--r);font-size:13px;margin-bottom:10px">${opts}</select>
    <label>Etiqueta (opcional)</label>
    <input type="text" id="assignLabel" placeholder="ej: Tarjeta principal" style="width:100%;padding:8px;border:1px solid var(--br);border-radius:var(--r);font-size:13px">
    <div id="assignErr" style="display:none;color:var(--txd);font-size:12px;margin-top:8px"></div>
  `,`saveAssignCard('${uid}')`);
}

async function saveAssignCard(uid){
  const empId=document.getElementById('assignEmpId').value;
  const label=document.getElementById('assignLabel').value.trim();
  try{
    await api('POST',`/api/employees/${empId}/cards`,{uid,label:label||null});
    unknownCards=unknownCards.filter(c=>c.uid!==uid);
    const badge=document.getElementById('unknownBadge');
    if(badge){
      if(unknownCards.length===0) badge.style.display='none';
      else badge.textContent=unknownCards.length;
    }
    closeModal();
    if(currentPage==='unknown') renderUnknownCards();
    if(currentPage==='employees') loadEmployees();
  }catch(e){showModalErr('assignErr',e.message);}
}

function openModal(title,body,saveCall,readOnly){

    <div id="modalBody">${body}</div>

      ${!readOnly&&saveCall?`<button class="btn btn-primary" onclick="${saveCall}">Guardar</button>`:''}
    </div>`;
}

  stopRemoteWifiScanPoll();
  stopRemoteDiagnosticsPoll();

}

function v(id){const el=document.getElementById(id);return el?el.value.trim()||null:null;}
function employeeEffectiveLimit(e){
  return parseInt(e?.effective_daily_limit ?? e?.daily_limit ?? 0,10)||0;
}
function employeeEffectiveLimitMode(e){
  return e?.effective_daily_limit_mode || e?.daily_limit_mode || 'enforce';
}
function employeeWarningEnabled(e){
  return (e?.effective_warning_enabled ?? e?.warning_enabled) === false ? false : true;
}
function employeeAccessLevelLabel(e){
  return accessLevelDisplayName(e);
}
function employeeAccessLevelCell(e){
  const label=employeeAccessLevelLabel(e);
  const source=accessLevelSourceLabel(e);
  if(source==='Manual'){
    return `<div>${escHtml(label)}</div><div style="font-size:11px;color:var(--tx3)">Configuración individual</div>`;
  }
  return `<div>${escHtml(label)}</div><div style="font-size:11px;color:var(--tx3)">Política reutilizable</div>`;
}
function employeeLimitModeLabel(mode){
  return {
    enforce:'Bloquea al alcanzar el límite',
    warn_only:'Solo advertir y registrar',
    off:'Sin límite diario'
  }[mode||'enforce']||'Bloquea al alcanzar el límite';
}
function employeeLimitPolicyText(e){
  const limit=employeeEffectiveLimit(e);
  const mode=employeeEffectiveLimitMode(e);
  const label=mode==='off'
    ? `Sin límite diario (referencia ${limit} cafés)`
    : mode==='warn_only'
      ? `${limit} cafés/día · solo advertencia`
      : `${limit} cafés/día · bloqueo activo`;
  return accessLevelSourceLabel(e)==='Jerarquía'
    ? `${label} · vía ${employeeAccessLevelLabel(e)}`
    : label;
}
function employeeLimitCell(e){
  return `<div>${employeeEffectiveLimit(e)} cafés/día</div><div style="font-size:11px;color:var(--tx3)">${employeeLimitModeLabel(employeeEffectiveLimitMode(e))}</div>`;
}
function empStatus(e){
  const taps=parseInt(e.taps_today||0,10)||0;
  const limit=employeeEffectiveLimit(e);
  const mode=employeeEffectiveLimitMode(e);
  if(mode==='off'||!limit) return 'ok';
  if(mode==='enforce'&&taps>=limit) return 'blocked';
  return taps>=Math.max(limit-1,1)?'warning':'ok';
}
function stBadge(s){return{blocked:'<span class="badge bd">Bloqueado</span>',warning:'<span class="badge bw">Advertencia</span>',ok:'<span class="badge bs">Normal</span>'}[s];}
function timeSince(iso){
  const d=new Date(iso);const now=new Date();const m=Math.floor((now-d)/60000);
  if(m<1) return 'Ahora';if(m<60) return `Hace ${m} min`;
  const h=Math.floor(m/60);if(h<24) return `Hace ${h}h`;
  return d.toLocaleDateString('es-AR');
}

function escHtml(value){
  return String(value??'').replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
}

function numericRssi(value){
  const n=Number(value);
  return Number.isFinite(n)?n:null;
}

function rssiDescriptor(value){
  const r=numericRssi(value);
  if(r===null) return 'sin dato';
  if(r>=-60) return 'excelente';
  if(r>=-68) return 'muy buena';
  if(r>=-75) return 'buena';
  if(r>=-82) return 'justa';
  return 'débil';
}

function formatMachineRssi(value){
  const r=numericRssi(value);
  if(r===null) return 'Sin dato';
  return `${r} dBm (${rssiDescriptor(r)})`;
}

function formatMachinePriceValue(value){
  const amount=parseInt(value||0,10)||0;
  return amount>0 ? `$${amount.toLocaleString('es-AR')}` : 'Sin definir';
}

function machineBackendBadge(machine){
  if(machine?.backend_ok===true) return {cls:'bs',label:'Backend OK'};
  if(machine?.online) return {cls:'bw',label:'Backend sin respuesta'};
  return {cls:'bw',label:'Sin telemetría'};
}

function machineStockSummaryHtml(summary){
  const data=summary||{};
  const configured=formatReportInt(data.configured_items||0);
  const low=parseInt(data.low_items||0,10)||0;
  const empty=parseInt(data.empty_items||0,10)||0;
  if(!(parseInt(data.configured_items||0,10)>0)){
    return 'Stock sin configurar';
  }
  const parts=[`<span>Stock: ${configured} selección${configured==='1'?'':'es'}</span>`];
  if(low>0) parts.push(`<span class="badge bw" style="margin-left:6px">Bajo ${low}</span>`);
  if(empty>0) parts.push(`<span class="badge bd" style="margin-left:6px">Sin stock ${empty}</span>`);
  if(low===0 && empty===0) parts.push('<span class="badge bs" style="margin-left:6px">OK</span>');
  return parts.join('');
}

function stockItemDisplayName(item){
  return item?.product_name || `Selección ${item?.item_id ?? '—'}`;
}

function stockStatusBadge(item){
  const cls=item?.status_badge||'bw';
  const label=item?.status_label||'Sin dato';
  return `<span class="badge ${cls}">${escHtml(label)}</span>`;
}

function stockMovementLabel(type){
  return ({
    sale:'Venta confirmada',
    restock:'Reposición',
    adjustment:'Ajuste',
    unconfigured_sale:'Venta sin selección configurada'
  })[type] || type || 'Movimiento';
}

function machineNetworkSummary(machine){
  const parts=[];
  if(machine?.wifi_ssid) parts.push(escHtml(machine.wifi_ssid));
  if(machine?.wifi_ip) parts.push(`IP ${escHtml(machine.wifi_ip)}`);
  if(numericRssi(machine?.wifi_rssi)!==null) parts.push(formatMachineRssi(machine.wifi_rssi));
  return parts.length?parts.join(' · '):'Sin telemetría de red reportada';
}
</script>
