<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoffeeControl — Administración</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<script src="vendor/exceljs.min.js"></script>
<!-- Anti-FOUC: aplica tema antes del primer render -->
<script>if(localStorage.getItem('cc_theme')==='light')document.documentElement.classList.add('light');</script>
<script>
// ══════════════════════════════════════════════════════
//  USUARIOS (solo gerente/admin)
// ══════════════════════════════════════════════════════
async function loadUsers(){
  render('<div class="page-title">Usuarios del panel</div><div class="empty">Cargando...</div>');
  try{
    const d = await api('GET','/api/admin-users');
    renderUsers(d.users||[]);
  }catch(e){render('<div class="page-title">Usuarios del panel</div><p style="color:var(--txd)">'+e.message+'</p>');}
}

function parseDepartmentScopesInput(raw){
  const values=Array.isArray(raw)?raw:String(raw||'').split(/[\n,;]+/);
  const seen=new Set();
  return values.map(v=>String(v||'').trim()).filter(Boolean).filter(v=>{
    const key=v.toLowerCase();
    if(seen.has(key)) return false;
    seen.add(key);
    return true;
  });
}

function departmentScopesFromUser(user){
  const scopes=parseDepartmentScopesInput(user?.department_scopes||[]);
  if(scopes.length) return scopes;
  return parseDepartmentScopesInput(user?.department||'');
}

function serializeDepartmentScopes(scopes){
  return parseDepartmentScopesInput(scopes).join('\n');
}

function formatDepartmentScopesLabel(user){
  const scopes=departmentScopesFromUser(user);
  if(!scopes.length) return '<span style="color:var(--tx3)">Todos</span>';
  return scopes.map(scope=>escHtml(scope)).join('<span style="color:var(--tx3)"> · </span>');
}

function toggleUserDepartmentFields(){
  const role=document.getElementById('uRole');
  const wrap=document.getElementById('uDepWrap');
  const input=document.getElementById('uDepScopes');
  if(!role||!wrap||!input) return;
  const isSupervisor=role.value==='supervisor';
  wrap.style.display=isSupervisor?'block':'none';
  input.disabled=!isSupervisor;
}

function openEditUserFromButton(btn){
  const payload=btn?.getAttribute('data-user')||'';
  if(!payload) return;
  const user=JSON.parse(decodeURIComponent(payload));
  if(user?.is_protected){
    alert('La cuenta protegida solo puede modificarse desde soporte local.');
    return;
  }
  openEditUser(user);
}

function renderUsers(users){
  const roleLabel = {admin:'Administrador',gerente:'Gerente',supervisor:'Supervisor',tecnico:'Técnico',distribuidor:'Distribuidor'};
  const roleBadge = {admin:'bi',gerente:'bi',supervisor:'bw',tecnico:'bs',distribuidor:'bs'};
  const rows = users.map(u=>`<tr>
    <td>
      <strong>${u.username}</strong>
      ${u.full_name?'<div style="font-size:11px;color:var(--tx3)">'+u.full_name+'</div>':''}
      ${u.email?'<div style="font-size:11px;color:var(--tx3)">'+u.email+'</div>':''}
    </td>
    <td><span class="badge ${roleBadge[u.role]||'bs'}">${roleLabel[u.role]||u.role}</span></td>
    <td>${formatDepartmentScopesLabel(u)}</td>
    <td>
      <span class="badge ${u.active?'bs':'bd'}">${u.active?'Activo':'Inactivo'}</span>
      ${u.is_protected?'<span class="badge bi" style="margin-left:4px">Protegida</span>':''}
    </td>
    <td style="font-size:11px;color:var(--tx3)">${new Date(u.created_at).toLocaleDateString('es-AR')}</td>
    <td style="white-space:nowrap">${u.is_protected
      ? '<span style="font-size:11px;color:var(--tx3)">Solo soporte local</span>'
      : `<button class="btn btn-ghost btn-xs" data-user="${escHtml(encodeURIComponent(JSON.stringify(u)))}" onclick="openEditUserFromButton(this)">Editar</button>
      <button class="btn btn-xs" style="background:var(--bgd);color:var(--txd);margin-left:4px" onclick="deleteUser(${u.id},'${u.username}')">Eliminar</button>`}
    </td>
  </tr>`).join('');

  render(`
  <div class="topbar">
    <div class="page-title">Usuarios del panel</div>
    <button class="btn btn-primary btn-sm" onclick="openAddUser()">+ Nuevo usuario</button>
  </div>
  <div class="card" style="margin-bottom:16px;background:var(--bgi);border-color:transparent">
    <div style="font-size:13px;color:var(--txi)">
      <strong>Roles:</strong>
      &nbsp;·&nbsp;<strong>Gerente</strong> — acceso total, puede crear/editar usuarios
      &nbsp;·&nbsp;<strong>Supervisor</strong> — puede ver dashboard y reportes de una o varias áreas asignadas, sin acceso a configuración
      &nbsp;·&nbsp;<strong>Técnico</strong> — opera máquinas, stock y comandos remotos, sin acceso a consumo por empleado ni configuración global
      &nbsp;·&nbsp;<strong>Distribuidor</strong> — onboarding y configuración de máquinas, sin acceso a analítica, empleados ni configuración global
      <br><strong>Cuentas protegidas:</strong> no pueden editarse, desactivarse ni cambiar su contraseña desde el panel; solo desde soporte local.
    </div>
  </div>
  <div class="card">
    <table>
      <thead><tr><th>Usuario</th><th>Rol</th><th>Áreas</th><th>Estado</th><th>Creado</th><th></th></tr></thead>
      <tbody>${rows||'<tr><td colspan="6" class="empty">Sin usuarios</td></tr>'}</tbody>
    </table>
  </div>`);
}

function openAddUser(){
  openModal('Nuevo usuario',`
    <div class="field-row">
      <div class="field"><label>Nombre de usuario *</label><input id="uUser" placeholder="supervisor.ventas" autocomplete="off"></div>
      <div class="field"><label>Nombre completo</label><input id="uFull" placeholder="María García"></div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Rol *</label>
        <select id="uRole" onchange="toggleUserDepartmentFields()">
          <option value="admin">Administrador (acceso total)</option>
          <option value="gerente">Gerente (acceso total)</option>
          <option value="supervisor" selected>Supervisor (solo lectura)</option>
          <option value="tecnico">Técnico (máquinas y stock)</option>
          <option value="distribuidor">Distribuidor (instalación y máquinas)</option>
        </select>
      </div>
    </div>
    <div class="field" id="uDepWrap">
      <label>Áreas del supervisor</label>
      <textarea id="uDepScopes" rows="4" placeholder="IT&#10;Ventas&#10;RRHH" style="width:100%;padding:10px 12px;border-radius:var(--r);border:1px solid var(--br);background:var(--bg2);color:var(--tx);font:inherit;resize:vertical"></textarea>
      <div style="font-size:12px;color:var(--tx3);margin-top:6px">Podés ingresar una por línea, o separarlas con coma o punto y coma. Dejar vacío = acceso a todas las áreas.</div>
    </div>
    <div class="field-row">
      <div class="field"><label>Email</label><input id="uEmail" type="email" placeholder="supervisor@empresa.com"></div>
      <div class="field"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>Contraseña * (mín. 8 caracteres)</label><input id="uPass" type="password" autocomplete="new-password"></div>
      <div class="field"><label>Repetir contraseña</label><input id="uPass2" type="password" autocomplete="new-password"></div>
    </div>
    <div class="err-banner" id="uErr"></div>
  `,'saveUser()');
  toggleUserDepartmentFields();
}

async function saveUser(){
  const pass=document.getElementById('uPass').value;
  const pass2=document.getElementById('uPass2').value;
  if(pass!==pass2){showModalErr('uErr','Las contraseñas no coinciden');return;}
  try{
    await api('POST','/api/admin-users',{
      username:v('uUser'),password:pass,role:v('uRole'),
      full_name:v('uFull'),email:v('uEmail'),
      department_scopes:parseDepartmentScopesInput(document.getElementById('uDepScopes')?.value||'')
    });
    closeModal();loadUsers();
  }catch(e){showModalErr('uErr',e.message);}
}

function openEditUser(user){
  const data=user||{};
  const scopes=serializeDepartmentScopes(departmentScopesFromUser(data));
  openModal('Editar: '+(data.username||''),`
    <div class="field-row">
      <div class="field"><label>Nombre completo</label><input id="uFull" value="${escHtml(data.full_name||'')}"></div>
      <div class="field">
        <label>Rol</label>
        <select id="uRole" onchange="toggleUserDepartmentFields()">
          <option value="gerente" ${data.role==='gerente'?'selected':''}>Gerente</option>
          <option value="admin" ${data.role==='admin'?'selected':''}>Administrador</option>
          <option value="supervisor" ${data.role==='supervisor'?'selected':''}>Supervisor</option>
          <option value="tecnico" ${data.role==='tecnico'?'selected':''}>Técnico</option>
          <option value="distribuidor" ${data.role==='distribuidor'?'selected':''}>Distribuidor</option>
        </select>
      </div>
    </div>
    <div class="field" id="uDepWrap">
      <label>Áreas asignadas</label>
      <textarea id="uDepScopes" rows="4" placeholder="IT&#10;Ventas&#10;RRHH" style="width:100%;padding:10px 12px;border-radius:var(--r);border:1px solid var(--br);background:var(--bg2);color:var(--tx);font:inherit;resize:vertical">${escHtml(scopes)}</textarea>
      <div style="font-size:12px;color:var(--tx3);margin-top:6px">Una por línea, coma o punto y coma. Dejar vacío = acceso a todas las áreas.</div>
    </div>
    <div class="field-row">
      <div class="field"><label>Email</label><input id="uEmail" type="email" value="${escHtml(data.email||'')}" placeholder="supervisor@empresa.com"></div>
      <div class="field"></div>
    </div>
    <div class="field"><label>Nueva contraseña (dejar vacío para no cambiar)</label><input id="uPass" type="password" autocomplete="new-password" placeholder="••••••••"></div>
    <div class="err-banner" id="uErr"></div>
  `,`updateUser(${data.id})`);
  toggleUserDepartmentFields();
}

async function updateUser(id){
  const pass=document.getElementById('uPass').value;
  const body={
    full_name:v('uFull'),
    role:v('uRole'),
    email:v('uEmail'),
    department_scopes:parseDepartmentScopesInput(document.getElementById('uDepScopes')?.value||'')
  };
  if(pass) body.password=pass;
  try{
    await api('PATCH',`/api/admin-users/${id}`,body);
    closeModal();loadUsers();
  }catch(e){showModalErr('uErr',e.message);}
}

async function deleteUser(id,username){
  if(!confirm('¿Desactivar al usuario "'+username+'"?')) return;
  try{await api('DELETE',`/api/admin-users/${id}`);loadUsers();}
  catch(e){alert('Error: '+e.message);}
}

// ══════════════════════════════════════════════════════
//  JERARQUÍAS / NIVELES DE ACCESO
// ══════════════════════════════════════════════════════
function normalizeAccessLevelIdValue(value){
  const raw=String(value??'').trim();
  if(!raw) return null;
  const parsed=parseInt(raw,10);
  return Number.isInteger(parsed)&&parsed>0 ? parsed : null;
}

function findAccessLevelById(id){
  const parsed=normalizeAccessLevelIdValue(id);
  if(!parsed) return null;
  return (accessLevelCache||[]).find(level=>Number(level.id)===parsed) || null;
}

function accessLevelDisplayName(levelOrRow){
  if(levelOrRow?.policy_source==='access_level' && levelOrRow?.access_level_name) return levelOrRow.access_level_name;
  if(levelOrRow?.access_level_name) return levelOrRow.access_level_name;
  const level=findAccessLevelById(levelOrRow?.access_level_id);
  if(level?.name) return level.name;
  return 'Manual';
}

function accessLevelSourceLabel(row){
  return row?.policy_source==='access_level' ? 'Jerarquía' : 'Manual';
}

function accessLevelPolicySummary(levelOrRow){
  return employeeLimitPolicyText({
    daily_limit: levelOrRow?.daily_limit,
    daily_limit_mode: levelOrRow?.daily_limit_mode,
    policy_source: 'manual',
    access_level_name: null
  });
}

function accessLevelOptionsHtml(selectedId,{includeInactive=false, allowManual=true}={}){
  const selected=normalizeAccessLevelIdValue(selectedId);
  const items=(accessLevelCache||[]).filter(level=>includeInactive || level.active!==false || Number(level.id)===selected);
  const rows=items.map(level=>{
    const inactive=level.active===false ? ' (inactiva)' : '';
    return `<option value="${level.id}" ${Number(level.id)===selected?'selected':''}>${escHtml(level.name)}${escHtml(inactive)}</option>`;
  }).join('');
  return `${allowManual?`<option value="">Manual / sin jerarquía</option>`:''}${rows}`;
}

async function refreshAccessLevelsCache(includeInactive=false){
  const qs=includeInactive ? '?include_inactive=true' : '';
  const d=await api('GET',`/api/access-levels${qs}`);
  accessLevelCache=d.access_levels||[];
  return accessLevelCache;
}

function renderAccessLevels(){
  const rows=(accessLevelCache||[]).map(level=>`<tr>
    <td>
      <div style="font-weight:600">${escHtml(level.name)}</div>
      <div style="font-size:11px;color:var(--tx3);font-family:monospace">${escHtml(level.code||'')}</div>
      ${level.description?`<div style="font-size:11px;color:var(--tx3);margin-top:4px">${escHtml(level.description)}</div>`:''}
    </td>
    <td>${escHtml(accessLevelPolicySummary(level))}</td>
    <td>${level.warning_enabled===false?'<span class="badge bw">Sin advertencia</span>':'<span class="badge bs">Advertencia activa</span>'}</td>
    <td>${formatReportInt(level.employees_count||0)}</td>
    <td>${formatReportInt(level.sort_order||0)}</td>
    <td>${level.active===false?'<span class="badge bd">Inactiva</span>':'<span class="badge bs">Activa</span>'}</td>
    <td style="white-space:nowrap">
      <button class="btn btn-ghost btn-xs" onclick="openEditAccessLevel(${level.id})">Editar</button>
      <button class="btn btn-ghost btn-xs" style="margin-left:4px;color:var(--txd)" onclick='deactivateAccessLevel(${level.id},${JSON.stringify(level.name||'')})'>Desactivar</button>
    </td>
  </tr>`).join('');
  render(`
    <div class="topbar">
      <div class="page-title">Jerarquías</div>
      <button class="btn btn-primary btn-sm" onclick="openAddAccessLevel()">+ Nueva jerarquía</button>
    </div>
    <div class="card" style="margin-bottom:16px;background:var(--bgi);border-color:transparent">
      <div style="font-size:13px;color:var(--txi)">
        Definí políticas reutilizables para distintos perfiles operativos. Cuando un empleado tiene jerarquía asignada, esa política prevalece sobre su configuración manual.
      </div>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>Jerarquía</th><th>Política diaria</th><th>Advertencia</th><th>Empleados</th><th>Orden</th><th>Estado</th><th></th></tr></thead>
        <tbody>${rows||'<tr><td colspan="7" class="empty">Sin jerarquías configuradas</td></tr>'}</tbody>
      </table>
    </div>
  `);
}

async function loadAccessLevels(){
  render('<div class="page-title">Jerarquías</div><div class="empty">Cargando...</div>');
  try{
    await refreshAccessLevelsCache(true);
    renderAccessLevels();
  }catch(e){
    render('<div class="page-title">Jerarquías</div><p style="color:var(--txd)">'+e.message+'</p>');
  }
}

function toggleAccessLevelCodeHelp(){
  const codeInput=document.getElementById('alCode');
  const hint=document.getElementById('alCodeHint');
  if(!codeInput||!hint) return;
  hint.textContent=codeInput.value.trim()
    ? 'Si lo cambiás, usá un identificador corto y estable.'
    : 'Si lo dejás vacío, se genera automáticamente a partir del nombre.';
}

function buildAccessLevelModalBody(level={}){
  return `
    <div class="field-row">
      <div class="field"><label>Nombre *</label><input id="alName" value="${escHtml(level.name||'')}" placeholder="Gerencia"></div>
      <div class="field"><label>Código interno</label><input id="alCode" value="${escHtml(level.code||'')}" placeholder="gerencia" oninput="toggleAccessLevelCodeHelp()"></div>
    </div>
    <div style="font-size:12px;color:var(--tx3);margin-top:-6px;margin-bottom:12px" id="alCodeHint">Si lo dejás vacío, se genera automáticamente a partir del nombre.</div>
    <div class="field"><label>Descripción</label><input id="alDescription" value="${escHtml(level.description||'')}" placeholder="Acceso preferencial para gerencia"></div>
    <div class="field-row">
      <div class="field"><label>Límite diario *</label><input id="alLimit" type="number" min="1" max="50" value="${escHtml(level.daily_limit||4)}"></div>
      <div class="field">
        <label>Modo</label>
        <select id="alMode">
          <option value="enforce" ${level.daily_limit_mode==='enforce'||!level.daily_limit_mode?'selected':''}>Bloquear al alcanzar el límite</option>
          <option value="warn_only" ${level.daily_limit_mode==='warn_only'?'selected':''}>Solo advertir y registrar</option>
          <option value="off" ${level.daily_limit_mode==='off'?'selected':''}>Sin límite diario</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>Orden</label><input id="alSort" type="number" min="0" max="9999" value="${escHtml(level.sort_order??100)}"></div>
      <div class="field"></div>
    </div>
    <label class="pw-inline" style="margin-top:-4px;margin-bottom:8px"><input type="checkbox" id="alWarn" ${level.warning_enabled===false?'':'checked'}> Enviar advertencia preventiva al acercarse al límite</label>
    <label class="pw-inline" style="margin-top:0;margin-bottom:12px"><input type="checkbox" id="alActive" ${level.active===false?'':'checked'}> Jerarquía activa</label>
    <div class="err-banner" id="alErr"></div>
  `;
}

function accessLevelFormPayload(){
  return {
    name: v('alName'),
    code: v('alCode'),
    description: v('alDescription'),
    daily_limit: parseInt(v('alLimit'),10)||4,
    daily_limit_mode: v('alMode')||'enforce',
    warning_enabled: !!document.getElementById('alWarn')?.checked,
    sort_order: parseInt(v('alSort'),10)||0,
    active: !!document.getElementById('alActive')?.checked
  };
}

function openAddAccessLevel(){
  openModal('Nueva jerarquía',buildAccessLevelModalBody({daily_limit:4,daily_limit_mode:'enforce',warning_enabled:true,sort_order:100,active:true}),'saveAccessLevel()');
  toggleAccessLevelCodeHelp();
}

async function saveAccessLevel(){
  try{
    await api('POST','/api/access-levels',accessLevelFormPayload());
    closeModal();
    await refreshAccessLevelsCache(true);
    if(currentPage==='levels') renderAccessLevels();
  }catch(e){showModalErr('alErr',e.message);}
}

async function openEditAccessLevel(id){
  const level=findAccessLevelById(id);
  if(!level){
    alert('No se encontró la jerarquía.');
    return;
  }
  openModal(`Editar jerarquía: ${level.name}`,buildAccessLevelModalBody(level),`updateAccessLevel(${id})`);
  toggleAccessLevelCodeHelp();
}

async function updateAccessLevel(id){
  try{
    await api('PATCH',`/api/access-levels/${id}`,accessLevelFormPayload());
    closeModal();
    await refreshAccessLevelsCache(true);
    if(currentPage==='levels') renderAccessLevels();
  }catch(e){showModalErr('alErr',e.message);}
}

async function deactivateAccessLevel(id,name){
  if(!confirm(`¿Desactivar la jerarquía "${name}"? Los empleados asignados conservarán la referencia, pero dejará de ofrecerse como opción nueva.`)) return;
  try{
    await api('DELETE',`/api/access-levels/${id}`);
    await refreshAccessLevelsCache(true);
    if(currentPage==='levels') renderAccessLevels();
  }catch(e){alert('Error: '+e.message);}
}

// ══════════════════════════════════════════════════════
//  NOTIFICACIONES
// ══════════════════════════════════════════════════════
async function loadNotifications(){
  render('<div class="page-title">Notificaciones</div><div class="empty">Cargando...</div>');
  try{
    const d = await api('GET','/api/notification-settings');
    renderNotifications(d.settings||{});
  }catch(e){
    render('<div class="page-title">Notificaciones</div><p style="color:var(--txd)">'+e.message+'</p>');
  }
}

function notificationFormPayload(){
  return {
    enabled: !!document.getElementById('nsEnabled')?.checked,
    recipient_emails: document.getElementById('nsRecipients')?.value || '',
    notify_employee_limit_warning: !!document.getElementById('nsEmployeeWarning')?.checked,
    notify_employee_daily_blocked: !!document.getElementById('nsEmployeeBlocked')?.checked,
    notify_machine_offline: !!document.getElementById('nsMachineOffline')?.checked,
    notify_stock_low: !!document.getElementById('nsStockLow')?.checked,
    notify_machine_backend_down: false,
    employee_limit_warning_lead: parseInt(document.getElementById('nsEmployeeWarningLead')?.value || '1', 10) || 1
  };
}

function setNotificationsMsg(msg,isError){
  const el=document.getElementById('notificationsMsg');
  if(!el) return;
  if(!msg){
    el.style.display='none';
    el.textContent='';
    return;
  }
  el.style.display='block';
  el.textContent=msg;
  el.style.background=isError?'var(--bgd)':'var(--bgs)';
  el.style.color=isError?'var(--txd)':'var(--txs)';
  el.style.borderColor=isError?'rgba(240,149,149,.28)':'rgba(192,221,151,.22)';
}

function renderNotifications(settings,msg='',isError=false){
  const smtpReady=!!settings.smtp_ready;
  const recipients=escHtml(settings.recipient_emails||'');
  const employeeWarningLead=Math.min(Math.max(parseInt(settings.employee_limit_warning_lead||1,10)||1,1),10);
  render(`
    <div class="topbar">
      <div class="page-title">Notificaciones</div>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-ghost btn-sm" onclick="sendNotificationTest()" ${smtpReady?'':'disabled title="Configurá SMTP en backend/.env para enviar pruebas"'}>Enviar prueba</button>
        <button class="btn btn-primary btn-sm" onclick="saveNotificationSettingsForm()">Guardar</button>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px;background:var(--bgi);border-color:transparent">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap">
          <div style="min-width:260px">
            <div style="font-size:13px;color:var(--txi);font-weight:600">Configuración operativa</div>
            <div style="font-size:13px;color:var(--tx2);margin-top:6px;line-height:1.5">
            Desde este formulario administrás destinatarios, eventos y la prueba manual de envío. Las plantillas de email quedan en la configuración interna del backend.
            </div>
          </div>
        <div><span class="badge ${smtpReady?'bs':'bd'}">${smtpReady?'SMTP listo':'SMTP pendiente'}</span></div>
      </div>
    </div>
    <div class="card">
      <label class="pw-inline" style="font-weight:600;margin-bottom:16px">
        <input type="checkbox" id="nsEnabled" ${settings.enabled!==false?'checked':''}>
        <span>Activar notificaciones automáticas por email</span>
      </label>

      <div class="field">

async function loadSystemSettings(){
  render('<div class="page-title">Sistema</div><div class="empty">Cargando...</div>');
  try{
    const d=await api('GET','/api/system-settings');
    renderSystemSettings(d.settings||{});
  }catch(e){
    render('<div class="page-title">Sistema</div><p style="color:var(--txd)">'+e.message+'</p>');
  }
}

function setSystemSettingsMsg(msg,isError){
  const el=document.getElementById('systemSettingsMsg');
  if(!el) return;
  if(!msg){
    el.style.display='none';
    el.textContent='';
    return;
  }
  el.style.display='block';
  el.textContent=msg;
  el.style.background=isError?'var(--bgd)':'var(--bgs)';
  el.style.color=isError?'var(--txd)':'var(--txs)';
  el.style.borderColor=isError?'rgba(240,149,149,.28)':'rgba(192,221,151,.22)';
}

function syncSystemTimezonePreset(){
  const select=document.getElementById('sysTimezonePreset');
  const input=document.getElementById('sysTimezone');
  if(!select||!input) return;
  const current=input.value.trim();
  const options=[...select.options].map(o=>o.value);
  select.value=options.includes(current)?current:'__manual__';
}

function updateSystemTimezonePreview(){
  const input=document.getElementById('sysTimezone');
  const out=document.getElementById('systemTimezonePreview');
  if(!input||!out) return;
  const tz=input.value.trim();
  if(!tz){
    out.innerHTML='<span style="color:var(--tx3)">Ingresá una zona horaria IANA, por ejemplo <code>America/Argentina/Buenos_Aires</code>.</span>';
    return;
  }
  try{
    const now=new Intl.DateTimeFormat('es-AR',{
      timeZone:tz,
      dateStyle:'full',
      timeStyle:'medium'
    }).format(new Date());
    out.innerHTML='Hora operativa actual: <strong>'+escHtml(now)+'</strong>';
  }catch(_){
    out.innerHTML='<span style="color:var(--txd)">Zona horaria inválida. Usá un identificador IANA como <code>America/Santiago</code> o <code>America/Mexico_City</code>.</span>';
  }
}

function handleSystemTimezonePreset(){
  const select=document.getElementById('sysTimezonePreset');
  const input=document.getElementById('sysTimezone');
  if(!select||!input) return;
  if(select.value && select.value!=='__manual__') input.value=select.value;
  updateSystemTimezonePreview();
}

function renderSystemSettings(settings,msg='',isError=false){
  const options=Array.isArray(settings.timezone_options)?settings.timezone_options:[];
  const currentTz=settings.business_timezone||'America/Argentina/Buenos_Aires';
  const presetValues=options.map(opt=>opt.value);
  const presetValue=presetValues.includes(currentTz)?currentTz:'__manual__';
  const optionHtml=options.map(opt=>`<option value="${escHtml(opt.value)}" ${opt.value===presetValue?'selected':''}>${escHtml(opt.label)} — ${escHtml(opt.value)}</option>`).join('');
  render(`
    <div class="topbar">
      <div class="page-title">Sistema</div>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-primary btn-sm" onclick="saveSystemSettingsForm()">Guardar</button>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px;background:var(--bgi);border-color:transparent">
      <div style="font-size:13px;color:var(--txi);font-weight:600">Zona horaria operativa</div>
      <div style="font-size:13px;color:var(--tx2);margin-top:6px;line-height:1.5">
        Define el día operativo del sistema. Afecta límites diarios, reportes mensuales, alertas por email y el reset offline del firmware.
      </div>
    </div>
    <div class="card">
      <div class="field-row">
        <div class="field">
          <label>Zona sugerida</label>
          <select id="sysTimezonePreset" onchange="handleSystemTimezonePreset()">
            ${optionHtml}
            <option value="__manual__" ${presetValue==='__manual__'?'selected':''}>Otra (ingreso manual)</option>
          </select>
        </div>
        <div class="field">
          <label>Zona horaria IANA</label>
          <input id="sysTimezone" value="${escHtml(currentTz)}" placeholder="America/Argentina/Buenos_Aires" oninput="syncSystemTimezonePreset();updateSystemTimezonePreview()">
        </div>
      </div>
      <div id="systemTimezonePreview" style="font-size:13px;color:var(--tx2);margin-top:4px;margin-bottom:14px"></div>
      <div style="font-size:12px;color:var(--tx3);line-height:1.6">
        Usá identificadores IANA reales. Ejemplos: <code>America/Argentina/Buenos_Aires</code>, <code>America/Santiago</code>, <code>America/Lima</code>, <code>America/Mexico_City</code>.
      </div>
      <div id="systemSettingsMsg" class="err-banner" style="display:none;margin-top:16px"></div>
    </div>
  `);
  updateSystemTimezonePreview();
  setSystemSettingsMsg(msg,isError);
}

async function saveSystemSettingsForm(){
  setSystemSettingsMsg('',false);
  try{
    const d=await api('PUT','/api/system-settings',{business_timezone:document.getElementById('sysTimezone')?.value||''});
    renderSystemSettings(d.settings||{},'Configuración guardada.',false);
  }catch(e){
    setSystemSettingsMsg(e.message,true);
  }
}

function auditFiltersPayload(){
  return {
    entity_type: document.getElementById('auditEntity')?.value || '',
    action: document.getElementById('auditAction')?.value || '',
    q: (document.getElementById('auditSearch')?.value || '').trim(),
    limit: parseInt(document.getElementById('auditLimit')?.value || '100', 10) || 100
  };
}

function auditQueryString(filters){
  const params=new URLSearchParams();
  if(filters.entity_type) params.set('entity_type',filters.entity_type);
  if(filters.action) params.set('action',filters.action);
  if(filters.q) params.set('q',filters.q);
  if(filters.limit) params.set('limit',String(filters.limit));
  const qs=params.toString();
  return qs ? '?'+qs : '';
}

function formatAuditDate(iso){
  if(!iso) return '—';
  const d=new Date(iso);
  if(Number.isNaN(d.getTime())) return iso;
  return d.toLocaleString('es-AR',{
    year:'numeric',
    month:'2-digit',
    day:'2-digit',
    hour:'2-digit',
    minute:'2-digit',
    second:'2-digit'
  });
}

function renderAuditLogs(logs, filters){
  const entityOptions=Object.entries(AUDIT_ENTITY_LABELS)
    .map(([value,label])=>`<option value="${value}" ${filters.entity_type===value?'selected':''}>${label}</option>`)
    .join('');
  const actionOptions=Object.entries(AUDIT_ACTION_LABELS)
    .map(([value,label])=>`<option value="${value}" ${filters.action===value?'selected':''}>${label}</option>`)
    .join('');
  const rows=(logs||[]).map(item=>{
    const actor=escHtml(item.actor_username||'Sistema');
    const role=escHtml(item.actor_role||'—');
    const entityType=escHtml(AUDIT_ENTITY_LABELS[item.entity_type]||item.entity_type||'—');
    const action=escHtml(AUDIT_ACTION_LABELS[item.action]||item.action||'—');
    const entityLabel=escHtml(item.entity_label||item.entity_id||'—');
    const summary=escHtml(item.summary||'—');
    const createdAt=escHtml(formatAuditDate(item.created_at));
    const details=item.details&&Object.keys(item.details).length
      ? `<details style="margin-top:8px"><summary style="cursor:pointer;color:var(--tx2)">Ver detalle técnico</summary><pre style="margin-top:8px;background:var(--bg2);border:1px solid var(--br);border-radius:12px;padding:10px;overflow:auto;font-size:11px;line-height:1.5;color:var(--tx2)">${escHtml(JSON.stringify(item.details,null,2))}</pre></details>`
      : '<span style="font-size:12px;color:var(--tx3)">Sin detalle adicional.</span>';
    return `
      <tr>
        <td style="white-space:nowrap;vertical-align:top">
          <div style="font-weight:600">${createdAt}</div>
          <div style="font-size:11px;color:var(--tx3);margin-top:4px">${escHtml(timeSince(item.created_at))}</div>
        </td>
        <td style="vertical-align:top">
          <div style="font-weight:600">${actor}</div>
          <div style="font-size:11px;color:var(--tx3);margin-top:4px">${role}</div>
        </td>
        <td style="vertical-align:top">
          <div style="font-weight:600">${action}</div>
          <div style="font-size:11px;color:var(--tx3);margin-top:4px">${entityType} · ${entityLabel}</div>
        </td>
        <td style="vertical-align:top;min-width:320px">
          <div>${summary}</div>
          <div style="font-size:11px;color:var(--tx3);margin-top:6px">
            IP: ${escHtml(item.actor_ip||'—')} · ${escHtml(item.actor_user_agent||'—')}
          </div>
          <div style="margin-top:8px">${details}</div>
        </td>
      </tr>
    `;
  }).join('');
  render(`
    <div class="topbar">
      <div class="page-title">Auditoría</div>
      <div style="display:flex;gap:8px;margin-left:auto">
        <button class="btn btn-ghost btn-sm" onclick="loadAuditLogs()">Actualizar</button>
      </div>
    </div>
    <div class="card" style="margin-bottom:16px;background:var(--bgi);border-color:transparent">
      <div style="font-size:13px;color:var(--txi);font-weight:600">Trazabilidad administrativa</div>
      <div style="font-size:13px;color:var(--tx2);margin-top:6px;line-height:1.5">
        Registra altas, ediciones, bloqueos, comandos remotos y cambios sensibles del panel con actor, fecha y detalle técnico saneado.
      </div>
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;align-items:end">
        <div class="field" style="margin:0">
          <label>Entidad</label>
          <select id="auditEntity">
            <option value="">Todas</option>
            ${entityOptions}
          </select>
        </div>
        <div class="field" style="margin:0">
          <label>Acción</label>
          <select id="auditAction">
            <option value="">Todas</option>
            ${actionOptions}
          </select>
        </div>
        <div class="field" style="margin:0">
          <label>Buscar</label>
          <input id="auditSearch" value="${escHtml(filters.q||'')}" placeholder="actor, resumen, entidad">
        </div>
        <div class="field" style="margin:0">
          <label>Máximo</label>
          <select id="auditLimit">
            <option value="50" ${String(filters.limit)==='50'?'selected':''}>50</option>
            <option value="100" ${String(filters.limit||100)==='100'?'selected':''}>100</option>
            <option value="200" ${String(filters.limit)==='200'?'selected':''}>200</option>
            <option value="500" ${String(filters.limit)==='500'?'selected':''}>500</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:12px">
        <button class="btn btn-ghost btn-sm" onclick="resetAuditFilters()">Limpiar</button>
        <button class="btn btn-primary btn-sm" onclick="applyAuditFilters()">Aplicar filtros</button>
      </div>
    </div>
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px">
        <div class="card-title" style="margin:0">Eventos recientes</div>
        <div style="font-size:12px;color:var(--tx3)">${logs.length} evento(s)</div>
      </div>
      ${rows ? `
        <table>
          <thead><tr><th>Fecha</th><th>Actor</th><th>Acción</th><th>Resumen</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      ` : '<div class="empty">No hay eventos que coincidan con esos filtros.</div>'}
    </div>
  `);
}

async function loadAuditLogs(customFilters){
  const filters=customFilters||{entity_type:'',action:'',q:'',limit:100};
  render('<div class="page-title">Auditoría</div><div class="empty">Cargando...</div>');
  try{
    const d=await api('GET','/api/audit-logs'+auditQueryString(filters));
    renderAuditLogs(d.logs||[],filters);
  }catch(e){
    render('<div class="page-title">Auditoría</div><p style="color:var(--txd)">'+e.message+'</p>');
  }
}

function applyAuditFilters(){
  loadAuditLogs(auditFiltersPayload());
}

function resetAuditFilters(){
  loadAuditLogs({entity_type:'',action:'',q:'',limit:100});
}

async function checkPending(){
  try{
    const d=await api('GET','/api/machines/pending');
    const n=(d.pending||[]).length;
    const badge=document.getElementById('pendingBadge');
    if(badge){badge.textContent=n;badge.style.display=n>0?'inline':'none';}
  }catch(_){}
}

function showPendingBadge(){
  const badge=document.getElementById('pendingBadge');
  if(!badge) return;
  const cur=parseInt(badge.textContent||'0');
  badge.textContent=cur+1;
  badge.style.display='inline';
  // Flash para llamar la atención
  badge.style.transform='scale(1.4)';
  setTimeout(()=>badge.style.transform='',400);
}

async function renderPendingSection(container){
  try{
    const d=await api('GET','/api/machines/pending');
    const pend=d.pending||[];
    if(!pend.length){container.innerHTML='';return;}
    const rows=pend.map(p=>{
      const since=timeSince(p.first_seen);
      const ping=timeSince(p.last_ping);
      return `<tr>
        <td><span style="font-family:monospace;font-size:12px;font-weight:500">${p.mac}</span></td>
        <td style="font-size:11px;color:var(--tx3)">Vista hace ${since}</td>
        <td style="font-size:11px;color:var(--tx3)">Ping hace ${ping}</td>
        <td style="white-space:nowrap">
          <button class="btn btn-primary btn-xs" onclick="approvePending(${p.id},'${p.mac}')">Aprobar</button>
          <button class="btn btn-xs" style="background:var(--bgd);color:var(--txd);margin-left:4px" onclick="rejectPending(${p.id})">Rechazar</button>
        </td>
      </tr>`;
    }).join('');
    container.innerHTML=`
      <div class="card" style="border-color:#E24B4A;margin-bottom:16px">
        <div class="card-title" style="color:var(--txd)">
          <span>Máquinas pendientes de aprobación (${pend.length})</span>
        </div>
        <p style="font-size:12px;color:var(--tx2);margin-bottom:12px">
          Estas máquinas se conectaron a la red y esperan ser aprobadas. Asignales un nombre y ubicación.
        </p>
        <table>
          <thead><tr><th>MAC address</th><th>Primera vez</th><th>Último ping</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
  }catch(_){container.innerHTML='';}
}

async function approvePending(id,mac){
  openModal('Aprobar máquina',`
    <p style="font-size:13px;color:var(--tx2);margin-bottom:16px">MAC: <code style="font-family:monospace;font-size:12px">${mac}</code></p>
    <div class="field"><label>Nombre de la máquina *</label><input id="pName" placeholder="Máquina A — Piso 1" autofocus></div>
    <div class="field"><label>Ubicación</label><input id="pLoc" placeholder="Piso 1, sector entrada"></div>
    <div class="field"><label>Precio del café *</label><input id="pPrice" type="number" min="1" step="1" value="1200" placeholder="1200"></div>
    <div class="err-banner" id="pErr"></div>
  `,`doApprovePending(${id})`);
}

async function doApprovePending(id){
  const name=document.getElementById('pName').value.trim();
  const price=parseInt(document.getElementById('pPrice')?.value||'0',10);
  if(!name){showModalErr('pErr','El nombre es requerido');return;}
  if(!Number.isInteger(price) || price<=0){showModalErr('pErr','El precio debe ser un entero mayor a cero');return;}
  try{
    await api('POST',`/api/machines/pending/${id}/approve`,{name,location:v('pLoc'),price_cents:price});
    closeModal();checkPending();loadMachines();
  }catch(e){showModalErr('pErr',e.message);}
}

async function rejectPending(id){
  if(!confirm('¿Rechazar esta máquina? Se eliminará de la lista.')) return;
  try{await api('POST',`/api/machines/pending/${id}/reject`);checkPending();loadMachines();}
  catch(e){alert('Error: '+e.message);}
}

  --bgi:#e6f1fb;--bgs:#eaf3de;--bgw:#faeeda;--bgd:#fcebeb;

  --txi:#0c447c;--txs:#27500a;--txw:#633806;--txd:#791f1f;
  --br:rgba(30,30,20,.12);--brm:rgba(30,30,20,.22);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--f);background:var(--bg3);color:var(--tx);min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-box{background:var(--bg);border:1px solid var(--br);border-radius:var(--rl);padding:36px;width:100%;max-width:380px;}
.login-logo{font-size:18px;font-weight:500;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--tx3);margin-bottom:28px;}
.login-err{background:var(--bgd);color:var(--txd);border-radius:var(--r);padding:8px 12px;font-size:13px;margin-bottom:12px;display:none;}

/* APP SHELL */
#appScreen{display:none;min-height:100vh;}
.sidebar{position:fixed;top:0;left:0;width:220px;height:100vh;background:var(--bg);border-right:1px solid var(--br);display:flex;flex-direction:column;z-index:100;}
.sidebar-logo{padding:20px 18px 0;font-size:15px;font-weight:500;}
.sidebar-sub{padding:2px 18px 16px;font-size:11px;color:var(--tx3);}
.sidebar-sep{height:1px;background:var(--br);margin:0 18px 8px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 18px;cursor:pointer;border-radius:var(--r);margin:0 8px 2px;font-size:13px;color:var(--tx2);transition:background .15s;}
.nav-item:hover{background:var(--bg2);}
.nav-item.on{background:var(--bg2);color:var(--tx);font-weight:500;}
.nav-icon{width:16px;text-align:center;font-size:14px;flex-shrink:0;}
.sidebar-bottom{margin-top:auto;padding:12px 8px;}
.main{margin-left:220px;padding:28px;min-height:100vh;}
.page-title{font-size:18px;font-weight:500;margin-bottom:20px;}

/* INPUTS / FORMS */
input,select,textarea{border:1px solid var(--brm);border-radius:var(--r);font-size:13px;font-family:var(--f);color:var(--tx);background:var(--bg);padding:8px 10px;width:100%;}
input:focus,select:focus{outline:2px solid var(--txi);border-color:transparent;}
label{font-size:12px;color:var(--tx2);display:block;margin-bottom:4px;}
.field{margin-bottom:14px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.field-row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;}
.pw-inline{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--tx2);margin-top:8px;user-select:none;cursor:pointer;}
.pw-inline input{width:auto;margin:0;padding:0;accent-color:#185FA5;}

/* BUTTONS */
.btn{padding:8px 16px;border-radius:var(--r);font-size:13px;font-family:var(--f);cursor:pointer;font-weight:500;border:none;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-primary{background:#185FA5;color:#fff;}
.btn-danger {background:#A32D2D;color:#fff;}
.btn-ghost  {background:var(--bg2);color:var(--tx);border:1px solid var(--brm);}
.btn-sm{padding:5px 12px;font-size:12px;}
.btn-xs{padding:3px 8px;font-size:11px;}
.scan-panel-status{display:none;background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:10px 12px;font-size:12px;color:var(--tx2);line-height:1.45;margin-bottom:10px;}
.scan-panel-list{display:none;max-height:220px;overflow:auto;margin-bottom:12px;padding-right:2px;}
.scan-panel-btn{width:100%;text-align:left;padding:10px 12px;background:#fff;color:var(--tx);border:1px solid var(--br);border-radius:14px;font-size:13px;cursor:pointer;margin-bottom:8px;transition:transform .12s ease,border-color .12s ease,box-shadow .12s ease,background .12s ease;}
.scan-panel-btn strong{display:block;font-size:13px;font-weight:700;}
.scan-panel-meta{display:block;font-size:11px;color:var(--tx3);margin-top:4px;}
.scan-panel-btn.is-active{border-color:var(--pri);background:var(--soft);box-shadow:0 0 0 3px rgba(24,95,165,.1);transform:translateY(-1px);}

/* CARDS / TABLES */
.card{background:var(--bg);border:1px solid var(--br);border-radius:var(--rl);padding:20px;margin-bottom:16px;}
.card-title{font-size:14px;font-weight:500;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;gap:12px;}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px;}
.metric{background:var(--bg2);border-radius:var(--r);padding:14px 12px;}
.mlbl{font-size:11px;color:var(--tx2);margin-bottom:5px;}
.mval{font-size:22px;font-weight:500;}
.mval.danger{color:var(--txd);}
.mval.warn{color:var(--txw);}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;padding:0 10px 10px;}
td{padding:10px;border-bottom:1px solid var(--br);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg2);}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500;}
.bs{background:var(--bgs);color:var(--txs);}
.bw{background:var(--bgw);color:var(--txw);}
.bd{background:var(--bgd);color:var(--txd);}
.bi{background:var(--bgi);color:var(--txi);}

/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:var(--bg);border-radius:var(--rl);padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:500;margin-bottom:20px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}

/* MISC */
.ws-pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;padding:3px 9px;border-radius:100px;background:var(--bg2);color:var(--tx3);border:1px solid var(--br);}
.ws-pill.ok{background:var(--bgs);color:var(--txs);border-color:transparent;}
.ws-pill.na{background:var(--bgi);color:var(--txi);border-color:transparent;}
.ws-dot{width:6px;height:6px;border-radius:50%;background:currentColor;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
.section-lbl{font-size:11px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
.empty{color:var(--tx3);font-size:13px;padding:20px 0;text-align:center;}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;}
.err-banner{background:var(--bgd);color:var(--txd);border-radius:var(--r);padding:8px 12px;font-size:12px;margin-bottom:12px;display:none;}
.search-bar{padding:7px 10px;border-radius:var(--r);border:1px solid var(--brm);font-size:13px;font-family:var(--f);color:var(--tx);background:var(--bg);min-width:200px;}

@media(max-width:700px){.sidebar{display:none;}.main{margin-left:0;padding:16px;}.metrics{grid-template-columns:repeat(2,1fr);}.field-row,.field-row3{grid-template-columns:1fr;}}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScreen">
<div class="login-box">
  <div class="login-logo">CoffeeControl</div>
  <div class="login-sub">Panel de administración</div>
  <div class="login-err" id="loginErr"></div>
  <div class="field"><label>Usuario</label><input type="text" id="loginUser" value="admin" autocomplete="username"></div>
  <div class="field">
    <label>Contraseña</label>
    <input type="password" id="loginPass" placeholder="••••••••" autocomplete="current-password">
    <label class="pw-inline">
      <input type="checkbox" id="showLoginPass" onchange="toggleLoginPassword()">
      <span>Mostrar contraseña</span>
    </label>
  </div>
  <div class="field" style="margin-bottom:6px">
    <label>URL del backend</label>
    <input type="text" id="loginUrl" placeholder="http://192.168.1.100:3000">
  </div>
  <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="doLogin()">Ingresar</button>
</div>
</div>

<!-- APP -->
<div id="appScreen">
<div class="sidebar">
  <div class="sidebar-logo">CoffeeControl</div>
  <div class="sidebar-sub">Panel de administración</div>
  <div class="sidebar-sep"></div>
  <div class="nav-item on"  onclick="nav('dashboard')"  id="n-dashboard"><span class="nav-icon">◈</span>Dashboard</div>
  <div class="nav-item"     onclick="nav('machines')"   id="n-machines"><span class="nav-icon">⬡</span>Máquinas <span id="pendingBadge" style="display:none;background:#E24B4A;color:#fff;border-radius:100px;font-size:10px;padding:1px 6px;margin-left:4px">0</span></div>
  <div class="nav-item"     onclick="nav('employees')"  id="n-employees"><span class="nav-icon">◉</span>Empleados</div>
  <div class="nav-item"     onclick="nav('reports')"    id="n-reports"><span class="nav-icon">◎</span>Reportes</div>
  <div class="nav-item"     onclick="nav('live')"       id="n-live"><span class="nav-icon">●</span>Feed en vivo</div>
  <div class="nav-item"     onclick="nav('unknown')"    id="n-unknown"><span class="nav-icon">⚑</span>NFCs sin asignar <span id="unknownBadge" style="display:none;background:#E24B4A;color:#fff;border-radius:100px;font-size:10px;padding:1px 6px;margin-left:4px">0</span></div>
  <div class="nav-item"     onclick="nav('nfc')"       id="n-nfc"><span class="nav-icon">📶</span>TAGs NFC</div>
  <div class="nav-item"     onclick="nav('levels')" id="n-levels" style="display:none"><span class="nav-icon">▣</span>Jerarquías</div>
  
  <div class="nav-item"     onclick="nav('notifications')" id="n-notifications" style="display:none"><span class="nav-icon">✉</span>Notificaciones</div>
  <div class="nav-item"     onclick="nav('system')" id="n-system" style="display:none"><span class="nav-icon">⌘</span>Sistema</div>
  <div class="nav-item"     onclick="nav('audit')" id="n-audit" style="display:none"><span class="nav-icon">⎘</span>Auditoría</div>
  <div class="nav-item"     onclick="nav('users')"      id="n-users" style="display:none"><span class="nav-icon">◐</span>Usuarios</div>
  <div id="userInfo" style="padding:8px 18px 0;font-size:12px;color:var(--tx3)"></div>
  <div class="sidebar-bottom">
    <div style="display:flex;align-items:center;gap:6px;margin-bottom:10px;">
      <div class="ws-pill" id="wsPill" style="flex:1;justify-content:center" title="Estado del feed en vivo via WebSocket"><span class="ws-dot"></span><span id="wsLbl">Desconectado</span></div>
      <button id="themeBtn" onclick="toggleTheme()" title="Modo claro / oscuro" style="background:var(--bg2);border:1px solid var(--br);border-radius:var(--r);padding:5px 7px;cursor:pointer;font-size:13px;color:var(--tx2);line-height:1;flex-shrink:0;">☀</button>
    </div>
    <div class="nav-item" onclick="doLogout()" style="color:var(--txd)"><span class="nav-icon">←</span>Cerrar sesión</div>
  </div>
</div>
<div class="main" id="mainContent"></div>
</div>

<!-- MODALS -->
<div class="modal-bg" id="modal"><div class="modal" id="modalInner"></div></div>

<script>
// ══════════════════════════════════════════════════════
//  Estado
// ══════════════════════════════════════════════════════
const CURRENT_ORIGIN = /^https?:\/\//.test(window.location.origin) ? window.location.origin : '';
let BASE = CURRENT_ORIGIN || localStorage.getItem('cc_url2') || 'http://localhost:3000';
let TOKEN = localStorage.getItem('cc_token') || '';
let WS = null;
let currentPage = 'dashboard';
let CURRENT_ROLE = null;
let pendingPollTimer = null;
let remoteWifiMachineName = '';
let remoteWifiMachineState = null;
let remoteWifiScanPollTimer = null;
let remoteWifiScanCommandId = null;
let remoteDiagMachineName = '';
let remoteDiagPollTimer = null;
let remoteDiagCommandId = null;
let remoteDiagLastResult = null;
let accessLevelCache = [];

function isManagerRole(){
  return CURRENT_ROLE==='admin' || CURRENT_ROLE==='gerente';
}

function isTechnicalRole(){
  return CURRENT_ROLE==='tecnico' || CURRENT_ROLE==='distribuidor';
}

function canManageMachineSetup(){
  return isManagerRole() || CURRENT_ROLE==='distribuidor';
}

function canManageMachineTechnicalConfig(){
  return CURRENT_ROLE==='admin' || isTechnicalRole();
}

function canOperateMachines(){
  return isManagerRole() || isTechnicalRole();
}

function defaultPageForRole(){
  return isTechnicalRole() ? 'machines' : 'dashboard';
}

function canAccessPage(page){
  if(isManagerRole()) return true;
  if(isTechnicalRole()) return ['machines'].includes(page);
  return ['dashboard','reports','live'].includes(page);
}

// ── Tema ─────────────────────────────────────────────
function toggleTheme(){
  const light = document.documentElement.classList.toggle('light');
  localStorage.setItem('cc_theme', light ? 'light' : 'dark');
  const btn = document.getElementById('themeBtn');
  if(btn) btn.textContent = light ? '☽' : '☀';
}
// Sincroniza icono del botón con el tema actual
(function(){
  const btn = document.getElementById('themeBtn');
  if(btn) btn.textContent = document.documentElement.classList.contains('light') ? '☽' : '☀';
})();
const AV=[{bg:'#e6f1fb',c:'#0c447c'},{bg:'#faeeda',c:'#633806'},{bg:'#e1f5ee',c:'#085041'},{bg:'#fcebeb',c:'#791f1f'},{bg:'#eaf3de',c:'#27500a'},{bg:'#fbeaf0',c:'#72243e'},{bg:'#eeedfe',c:'#3c3489'},{bg:'#faece7',c:'#712b13'}];

// ══════════════════════════════════════════════════════
//  Init
// ══════════════════════════════════════════════════════
document.getElementById('loginUrl').value = BASE;
if(TOKEN) showApp();

// ══════════════════════════════════════════════════════
//  AUTH
// ══════════════════════════════════════════════════════
function toggleLoginPassword(){
  const input=document.getElementById('loginPass');
  const toggle=document.getElementById('showLoginPass');
  if(!input||!toggle) return;
  input.type=toggle.checked?'text':'password';
}

async function doLogin(){
  BASE = document.getElementById('loginUrl').value.trim().replace(/\/$/,'');
  localStorage.setItem('cc_url2', BASE);
  const u = document.getElementById('loginUser').value.trim();
  const p = document.getElementById('loginPass').value;
  const err = document.getElementById('loginErr');
  err.style.display='none';
  try{
    const res = await fetch(BASE+'/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
    const d = await res.json();
    if(!res.ok) throw new Error(d.error||'Error');
    TOKEN = d.token;
    localStorage.setItem('cc_token', TOKEN);
    showApp();
  }catch(e){
    err.textContent = e.message;
    err.style.display='block';
  }
}
document.getElementById('loginPass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

function doLogout(){
  TOKEN=''; localStorage.removeItem('cc_token');
  if(WS){WS.close();WS=null;}
  if(pendingPollTimer){clearInterval(pendingPollTimer);pendingPollTimer=null;}
  CURRENT_ROLE=null;
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginScreen').style.display='flex';
}

function showApp(){
  try{
    const payload = JSON.parse(atob(TOKEN.split('.')[1]));
    CURRENT_ROLE = payload.role || null;
    const roleLabel = {admin:'Administrador',gerente:'Gerente',supervisor:'Supervisor',tecnico:'Técnico',distribuidor:'Distribuidor'}[payload.role]||payload.role;
    const ui = document.getElementById('userInfo');
    if(ui) ui.innerHTML = '<strong>'+payload.username+'</strong><br>'+roleLabel;
    const manager = isManagerRole();
    const technical = isTechnicalRole();
    const machineNav=document.getElementById('n-machines');
    if(machineNav) machineNav.style.display=canOperateMachines()?'flex':'none';
    ['n-employees','n-unknown','n-nfc','n-levels','n-notifications','n-system','n-audit'].forEach(id=>{
      const el=document.getElementById(id);
      if(el) el.style.display=manager?'flex':'none';
    });
    ['n-dashboard','n-reports','n-live'].forEach(id=>{
      const el=document.getElementById(id);
      if(!el) return;
      el.style.display=technical?'none':'flex';
    });
    const nu = document.getElementById('n-users');
    if(nu) nu.style.display=manager?'flex':'none';
  }catch(_){}
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  connectWS();
  nav(defaultPageForRole());
  if(pendingPollTimer){clearInterval(pendingPollTimer);pendingPollTimer=null;}
  if(canManageMachineSetup()){
    checkPending();
    pendingPollTimer=setInterval(checkPending, 30000);
  }
  if(isManagerRole()){
    loadUnknownBadge();
  }
}

// ══════════════════════════════════════════════════════
//  API helper
// ══════════════════════════════════════════════════════
async function api(method, path, body){
  const opts={method,headers:{'Authorization':'Bearer '+TOKEN,'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  const res=await fetch(BASE+path,opts);
  if(res.status===401){doLogout();throw new Error('Sesión expirada');}
  const d=await res.json();
  if(!res.ok) throw new Error(d.error||'Error HTTP '+res.status);
  return d;
}

// ══════════════════════════════════════════════════════
//  WebSocket
// ══════════════════════════════════════════════════════
function connectWS(){
  if(WS){WS.close();WS=null;}
  if(!TOKEN){setWS('off');return;}
  if(isTechnicalRole()){setWS('na');return;}
  const url=BASE.replace(/^http/,'ws')+'/ws?token='+encodeURIComponent(TOKEN);
  try{WS=new WebSocket(url);}catch(e){setWS('err');return;}
  WS.onopen=()=>setWS('ok');
  WS.onclose=(ev)=>{
    setWS('off');
    if(ev && ev.code===4001){
      TOKEN=''; localStorage.removeItem('cc_token');
      CURRENT_ROLE=null;
      document.getElementById('appScreen').style.display='none';
      document.getElementById('loginScreen').style.display='flex';
      return;
    }
    if(TOKEN) setTimeout(connectWS,5000);
  };
  WS.onerror=()=>setWS('err');
  WS.onmessage=(e)=>{
    try{
      const msg=JSON.parse(e.data);
      if(currentPage==='dashboard') loadDashboard();
      if(currentPage==='live') prependLive(msg);
    if(canOperateMachines() && (currentPage==='machines'||(msg.event==='machine_blocked'||msg.event==='machine_unblocked'||msg.event==='machine_pending'||msg.event==='machine_approved'||msg.event==='machine_stock_updated'||msg.event==='machine_command_queued'))) loadMachines();
      if(msg.event==='machine_stock_updated' && machineStockState.machineId===msg.machine_id && document.getElementById('modal')?.classList.contains('show')) refreshMachineStockModal();
      if(canManageMachineSetup() && msg.event==='machine_pending') showPendingBadge();
      if(isManagerRole() && msg.event==='card_unknown') handleUnknownCard(msg);
    }catch(_){}
  };
}
function setWS(s){
  const p=document.getElementById('wsPill'),l=document.getElementById('wsLbl');
  p.className='ws-pill';
  if(s==='ok'){
    p.classList.add('ok');
    l.textContent='En vivo';
    p.title='Estado del feed en vivo via WebSocket: conectado';
  }else if(s==='err'){
    l.textContent='Error WS';
    p.title='Estado del feed en vivo via WebSocket: error al conectar';
  }else if(s==='na'){
    p.classList.add('na');
    l.textContent='WS no aplica';
    p.title='Este rol operativo no usa feed en vivo ni WebSocket.';
  }else{
    l.textContent='Desconectado';
    p.title='Estado del feed en vivo via WebSocket: desconectado';
  }
}

// ══════════════════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════════════════
function nav(page){
  if(!canAccessPage(page)) page=defaultPageForRole();
  currentPage=page;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('on'));
  const ni=document.getElementById('n-'+page);
  if(ni) ni.classList.add('on');
  const pages={
    dashboard:loadDashboard,
    machines:loadMachines,
    employees:loadEmployees,
    reports:loadReports,
    live:loadLive,
    unknown:loadUnknown,
    users:loadUsers,
    nfc:loadNfcTags,
    levels:loadAccessLevels,
    notifications:loadNotifications,
    system:loadSystemSettings,
    audit:loadAuditLogs
  };
  if(pages[page]) pages[page]();
}

// ══════════════════════════════════════════════════════
//  VISTA GLOBAL DE TAGs NFC
// ══════════════════════════════════════════════════════
async function loadNfcTags(){
  render('<div class="page-title">TAGs NFC</div><div class="empty">Cargando...</div>');
  try{
    const d = await api('GET','/api/nfc-cards');
    renderNfcTags(d.cards||[]);
  }catch(e){
    render('<div class="page-title">TAGs NFC</div><p style="color:var(--txd)">'+e.message+'</p>');
  }
}

function renderNfcTags(cards){
  // Filtros visuales
  render(`
    <div class="topbar">
      <div class="page-title">TAGs NFC</div>
      <button class="btn btn-primary btn-sm" onclick="openAddNfcTag()">+ Nuevo TAG NFC</button>
    </div>
    <div class="card" style="margin-bottom:16px;background:var(--bgi);border-color:transparent">
      <div style="display:flex;gap:16px;align-items:flex-end;flex-wrap:wrap">
        <div style="display:flex;flex-direction:column;gap:3px">
          <label style="font-size:11px;color:var(--tx3)">Buscar</label>
          <input id="nfcSearch" placeholder="UID, etiqueta o empleado" style="font-size:12px;padding:5px 8px;border:1px solid var(--br);border-radius:var(--r);background:var(--bg2)" oninput="applyNfcFilters()">
        </div>
        <div style="display:flex;flex-direction:column;gap:3px">
          <label style="font-size:11px;color:var(--tx3)">Estado</label>
          <select id="nfcState" onchange="applyNfcFilters()" style="font-size:12px;padding:5px 8px;border:1px solid var(--br);border-radius:var(--r);background:var(--bg2)"><option value="">Todos</option><option value="active">Activos</option><option value="lost">Perdidos</option><option value="inactive">De baja</option></select>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="resetNfcFilters()" style="align-self:flex-end">Limpiar filtros</button>
      </div>
    </div>
    <div class="card">
      <table>
        <thead><tr><th>UID</th><th>Etiqueta</th><th>Empleado</th><th>Estado</th><th>Alta</th><th></th></tr></thead>
        <tbody id="nfcTbody"></tbody>
      </table>
    </div>
  `);
  window._allNfcCards = cards;
  applyNfcFilters();
}

function applyNfcFilters(){
  const q=(document.getElementById('nfcSearch')?.value||'').toLowerCase().trim();
  const state=document.getElementById('nfcState')?.value||'';
  const filtered=(window._allNfcCards||[]).filter(c=>{
    if(q && !(`${c.uid} ${c.label||''} ${c.employee_name||''}`.toLowerCase().includes(q))) return false;
    if(state && nfcCardStatus(c)!==state) return false;
    return true;
  });
  const rows = filtered.map(c => [
    '<tr>',
      `<td style="font-family:monospace;font-size:12px">${c.uid}</td>`,
      `<td>${c.label ? c.label.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '—'}</td>`,
      `<td>${c.employee_name ? c.employee_name.replace(/</g,'&lt;').replace(/>/g,'&gt;') : '—'}</td>`,
      `<td>${renderNfcCardBadge(c)}</td>`,
      `<td style="font-size:11px;color:var(--tx3)">${c.created_at ? new Date(c.created_at).toLocaleDateString('es-AR') : ''}</td>`,
      `<td style="white-space:nowrap">${renderNfcTagActions(c)}</td>`,
    '</tr>'
  ].join('')).join('');
  const tbody = document.getElementById('nfcTbody');
  if (tbody) tbody.innerHTML = rows || '<tr><td colspan="6" class="empty">Sin TAGs NFC</td></tr>';
}

function resetNfcFilters(){
  document.getElementById('nfcSearch').value='';
  document.getElementById('nfcState').value='';
  applyNfcFilters();
}

function getNfcCard(cardId){
  return (window._allNfcCards||[]).find(c=>c.id===cardId) || null;
}

function nfcCardStatus(card){
  const raw=String(card?.status||'').toLowerCase().trim();
  if(['active','inactive','lost'].includes(raw)) return raw;
  return card?.active ? 'active' : 'inactive';
}

function nfcCardStateMeta(card){
  const status=nfcCardStatus(card);
  if(status==='lost') return {cls:'bw',label:'Perdido'};
  if(status==='inactive') return {cls:'bd',label:'De baja'};
  return {cls:'bs',label:'Activo'};
}

function renderNfcCardBadge(card){
  const meta=nfcCardStateMeta(card);
  return `<span class="badge ${meta.cls}">${meta.label}</span>`;
}

function renderNfcTagActions(card){
  const status=nfcCardStatus(card);
  const label=(card.label||'').replace(/'/g,'&#39;');
  const uid=(card.uid||'').replace(/'/g,'&#39;');
  const actions=[
    `<button class="btn btn-ghost btn-xs" onclick="renameNfcTag(${card.id},'${label}')">Renombrar</button>`,
    `<button class="btn btn-ghost btn-xs" onclick="reassignNfcTag(${card.id},'${uid}')">Reasignar</button>`
  ];
  if(status==='active'){
    actions.push(`<button class="btn btn-ghost btn-xs" style="color:var(--txw)" onclick="markNfcTagLost(${card.id})">Marcar perdido</button>`);
    actions.push(`<button class="btn btn-ghost btn-xs" style="color:var(--txd)" onclick="deactivateNfcTag(${card.id})">Dar de baja</button>`);
  }else if(status==='lost'){
    actions.push(`<button class="btn btn-ghost btn-xs" onclick="reactivateNfcTag(${card.id})">Reactivar</button>`);
    actions.push(`<button class="btn btn-ghost btn-xs" style="color:var(--txd)" onclick="deactivateNfcTag(${card.id})">Dar de baja</button>`);
  }else{
    actions.push(`<button class="btn btn-ghost btn-xs" onclick="reactivateNfcTag(${card.id})">Reactivar</button>`);
  }
  return actions.join('');
}

async function refreshEmployeesCache(){
  const d=await api('GET','/api/employees');
  allEmployees=d.employees||[];
  return allEmployees;
}

async function openAddNfcTag(){
  try{
    const employees=await refreshEmployeesCache();
    if(!employees.length){
      alert('Primero tenés que crear al menos un empleado.');
      return;
    }
    const opts=employees.map(e=>`<option value="${e.id}">${(e.name||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</option>`).join('');
    openModal('Registrar TAG NFC',`
      <div class="field">
        <label>Empleado *</label>
        <select id="nfcEmpId">${opts}</select>
      </div>
      <div class="field">
        <label>UID del TAG NFC (hexadecimal) *</label>
        <input id="nfcUid" placeholder="A1B2C3D4" style="font-family:monospace;text-transform:uppercase">
      </div>
      <div class="field">
        <label>Etiqueta (opcional)</label>
        <input id="nfcLabel" placeholder="TAG principal / Llavero">
      </div>
      <div class="err-banner" id="nfcAddErr"></div>
    `,'saveNfcTag()');
  }catch(e){alert('Error: '+e.message);}
}

async function saveNfcTag(){
  const empId=parseInt(document.getElementById('nfcEmpId')?.value||'0',10);
  const uid=(document.getElementById('nfcUid')?.value||'').toUpperCase().trim();
  const label=(document.getElementById('nfcLabel')?.value||'').trim();
  if(!empId){showModalErr('nfcAddErr','Seleccioná un empleado');return;}
  if(!uid){showModalErr('nfcAddErr','El UID es requerido');return;}
  try{
    await api('POST',`/api/employees/${empId}/cards`,{uid,label:label||'TAG NFC'});
    await refreshEmployeesCache();
    closeModal();
    loadNfcTags();
  }catch(e){showModalErr('nfcAddErr',e.message);}
}

async function renameNfcTag(cardId,currentLabel){
  const card=getNfcCard(cardId);
  if(!card){alert('No se encontró el TAG NFC seleccionado.');return;}
  const newLabel=prompt('Nueva etiqueta para el TAG NFC:',String(currentLabel||''));
  if(newLabel===null) return;
  try{
    await api('PATCH',`/api/employees/${card.employee_id}/cards/${cardId}`,{label:newLabel.trim()||'TAG NFC'});
    await refreshEmployeesCache();
    loadNfcTags();
  }catch(e){alert('Error: '+e.message);}
}

async function reassignNfcTag(cardId,uid){
  const card=getNfcCard(cardId);
  if(!card){alert('No se encontró el TAG NFC seleccionado.');return;}
  try{
    const employees=await refreshEmployeesCache();
    const opts=employees.map(e=>`<option value="${e.id}" ${e.id===card.employee_id?'selected':''}>${(e.name||'').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</option>`).join('');
    openModal('Reasignar TAG NFC',`
      <p style="font-size:13px;color:var(--tx2);margin-bottom:12px">UID: <code style="font-family:monospace;background:var(--bg2);padding:2px 6px;border-radius:4px">${uid}</code></p>
      <div class="field">
        <label>Nuevo empleado *</label>
        <select id="reassignNfcEmpId">${opts}</select>
      </div>
      <div class="err-banner" id="reassignNfcErr"></div>
    `,`saveNfcReassign(${cardId})`);
  }catch(e){alert('Error: '+e.message);}
}

async function saveNfcReassign(cardId){
  const card=getNfcCard(cardId);
  if(!card){showModalErr('reassignNfcErr','No se encontró el TAG NFC seleccionado');return;}
  const newEmpId=parseInt(document.getElementById('reassignNfcEmpId')?.value||'0',10);
  if(!newEmpId){showModalErr('reassignNfcErr','Seleccioná un empleado');return;}
  try{
    await api('PATCH',`/api/employees/${card.employee_id}/cards/${cardId}`,{employee_id:newEmpId,status:'active'});
    await refreshEmployeesCache();
    closeModal();
    loadNfcTags();
  }catch(e){showModalErr('reassignNfcErr',e.message);}
}

async function markNfcTagLost(cardId){
  const card=getNfcCard(cardId);
  if(!card){alert('No se encontró el TAG NFC seleccionado.');return;}
  const label=card.label ? ` (${card.label})` : '';
  if(!confirm(`¿Marcar como perdido el TAG NFC ${card.uid}${label}? Dejará de autorizar consumos hasta que lo reactives o reasignes.`)) return;
  try{
    await api('PATCH',`/api/employees/${card.employee_id}/cards/${cardId}`,{status:'lost'});
    await refreshEmployeesCache();
    loadNfcTags();
  }catch(e){alert('Error: '+e.message);}
}

async function deactivateNfcTag(cardId){
  const card=getNfcCard(cardId);
  if(!card){alert('No se encontró el TAG NFC seleccionado.');return;}
  const label=card.label ? ` (${card.label})` : '';
  if(!confirm(`¿Dar de baja el TAG NFC ${card.uid}${label}? Quedará desactivado pero conservará su historial.`)) return;
  try{
    await api('DELETE',`/api/employees/${card.employee_id}/cards/${cardId}`);
    await refreshEmployeesCache();
    loadNfcTags();
  }catch(e){alert('Error: '+e.message);}
}

async function reactivateNfcTag(cardId){
  const card=getNfcCard(cardId);
  if(!card){alert('No se encontró el TAG NFC seleccionado.');return;}
  try{
    await api('PATCH',`/api/employees/${card.employee_id}/cards/${cardId}`,{status:'active'});
    await refreshEmployeesCache();
    loadNfcTags();
  }catch(e){alert('Error: '+e.message);}
}

function renderDashboard(today,monthly,machinesData){
  const emps=today.employees||[];
  const s=today.summary||{};
  const mc=monthly.total_spent_cents||0;
  const mt=(monthly.employees||[]).reduce((a,e)=>a+parseInt(e.taps_total||0),0);
  const blk=s.blocked_employees||0;
  const mBlk=(machinesData.machines||[]).filter(m=>m.blocked).length;
  const mOnline=(machinesData.machines||[]).filter(m=>m.online).length;
  const mTotal=(machinesData.machines||[]).length;

  const metricsHtml=[
    ['Gasto mensual',formatReportMoney(mc),''],
    ['Cafés este mes',mt.toLocaleString(),''],
    ['Empleados bloqueados hoy',blk,blk>0?'danger':''],
    ...(isManagerRole()
      ? [
          ['Máquinas bloqueadas',mBlk,mBlk>0?'warn':''],
          ['Máquinas online',`${mOnline}/${mTotal}`,mOnline===0&&mTotal>0?'warn':'']
        ]
      : [])
  ].map(([l,v,cls])=>`<div class="metric"><div class="mlbl">${l}</div><div class="mval ${cls}">${v}</div></div>`).join('');

  const sorted=[...emps].sort((a,b)=>b.taps_today-a.taps_today);
  const rankHtml=sorted.map((e,i)=>{
    const av=AV[i%8];
    const ini=e.employee_name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const st=empStatus(e);
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:8px"><div class="avatar" style="background:${av.bg};color:${av.c}">${ini}</div><div><div style="font-weight:500;font-size:13px">${e.employee_name}</div><div style="font-size:11px;color:var(--tx3)">${e.department||''}</div></div></div></td>
      <td>${e.taps_today}/${e.daily_limit}</td>
      <td>${formatReportMoney(e.spent_today_cents||0)}</td>
      <td>${stBadge(st)}</td>
      <td><button class="btn btn-ghost btn-xs" onclick="showEmployeeDetail(${e.employee_id})">Ver</button></td>
    </tr>`;
  }).join('');

  const html=`
  <div class="topbar"><div class="page-title">Dashboard</div><div style="font-size:12px;color:var(--tx3)">Día operativo ${escHtml(today.business_date||'—')} · ${escHtml(today.business_timezone||'—')}</div></div>
  <div class="metrics">${metricsHtml}</div>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card">
      <div class="card-title">Ranking hoy</div>
      <table><thead><tr><th>Empleado</th><th>Cafés</th><th>$</th><th>Estado</th><th></th></tr></thead><tbody>${rankHtml}</tbody></table>
    </div>
    <div class="card">
      <div class="card-title">Consumo hoy</div>
      <div style="position:relative;height:240px"><canvas id="dashChart"></canvas></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Alertas activas</div>
    <div id="alertsBox"></div>
  </div>`;

  render(html);

  const wa=emps.filter(e=>empStatus(e)!=='ok');
  document.getElementById('alertsBox').innerHTML=wa.length
    ?wa.map(e=>{const b=empStatus(e)==='blocked';return `<div style="background:${b?'var(--bgd)':'var(--bgw)'};color:${b?'var(--txd)':'var(--txw)'};border-radius:var(--r);padding:9px 12px;margin-bottom:8px;font-size:13px"><strong>${e.employee_name}</strong> — ${b?`Bloqueado (${e.taps_today}/${e.daily_limit} hoy)`:`Advertencia (${e.taps_today}/${e.daily_limit} hoy)`}</div>`;}).join('')
    :'<div class="empty">Sin alertas activas.</div>';

  const labels=sorted.map(e=>e.employee_name.split(' ')[0]);
  const data=sorted.map(e=>parseInt(e.taps_today));
  const colors=sorted.map(e=>empStatus(e)==='blocked'?'#E24B4A':empStatus(e)==='warning'?'#EF9F27':'#1D9E75');
  const canvas=document.getElementById('dashChart');
  if(canvas){
    if(dashChart) dashChart.destroy();
    dashChart=new Chart(canvas,{type:'bar',data:{labels,datasets:[{data,backgroundColor:colors,borderRadius:4,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{display:false},ticks:{font:{size:10},color:'#888',maxRotation:40,autoSkip:false}},y:{grid:{color:'rgba(128,128,128,.08)'},ticks:{font:{size:10},color:'#888'}}}}});
  }
}

function applyMachineFilters(){
  const q=(document.getElementById('mfSearch')?.value||'').toLowerCase().trim();
  const st=document.getElementById('mfStatus')?.value||'';
  const act=document.getElementById('mfActivity')?.value||'';
  const technicalConfig=canManageMachineTechnicalConfig();
  const filtered=allMachines.filter(m=>{
    if(q && !`${m.name} ${m.location||''} ${m.wifi_ssid||''} ${m.wifi_ip||''} ${m.backend_error||''}`.toLowerCase().includes(q)) return false;
    if(st){const s=m.blocked?'blocked':m.active?'active':'inactive'; if(s!==st) return false;}
    if(act==='today' && !(m.taps_today>0)) return false;
    if(act==='none' && (m.taps_month>0)) return false;
    return true;
  });
  const rows=filtered.map(m=>{
    const manager=isManagerRole();
    const since=m.last_tap_at?timeSince(m.last_tap_at):'Nunca';
    const stBg=m.blocked?'bd':m.active?'bs':'bw';
    const stLbl=m.blocked?'Bloqueada':m.active?'Activa':'Inactiva';
    const onlineDot=`<span style="width:8px;height:8px;border-radius:50%;flex-shrink:0;background:${m.online?'#22c55e':'#94a3b8'};display:inline-block" title="${m.online?'Online — activa en los últimos 3 min':'Offline'}"></span>`;
    const backend=machineBackendBadge(m);
    const stockLine=machineStockSummaryHtml(m.stock_summary);
    const networkLine=`${machineNetworkSummary(m)}</div><div style="font-size:11px;color:var(--tx3);margin-top:4px">Precio ${formatMachinePriceValue(m.price_cents)} · ${stockLine}`;
    const lastSeen=m.last_seen?timeSince(m.last_seen):'Nunca';
    const backendError=m.backend_error?`<div style="font-size:11px;color:var(--txd);margin-top:4px">${escHtml(m.backend_error)}</div>`:'';
    return `<tr>
      <td><div style="display:flex;align-items:flex-start;gap:6px">${onlineDot}<div><strong>${escHtml(m.name)}</strong><div style="font-size:11px;color:var(--tx3)">${escHtml(m.location||'—')}</div><div style="font-size:11px;color:var(--tx3);margin-top:3px">${networkLine}</div></div></div></td>
      <td><span class="badge ${stBg}">${stLbl}</span><span class="badge ${backend.cls}" style="margin-left:6px">${backend.label}</span>${m.blocked?`<div style="font-size:11px;color:var(--txd);margin-top:4px">${escHtml(m.blocked_reason||'')}</div>`:''}<div style="font-size:11px;color:var(--tx3);margin-top:4px">Último contacto ${lastSeen}</div>${backendError}</td>
      <td>${m.taps_today||0}</td>
      <td>${m.taps_month||0}</td>
      <td>${formatReportMoney(m.cost_month_cents||0)}</td>
      <td style="font-size:11px;color:var(--tx3)">${since}</td>
      <td style="white-space:nowrap">
        ${manager ? (m.blocked
          ?`<button class="btn btn-ghost btn-xs" onclick="unblockMachine(${m.id},'${m.name}')">Desbloquear</button>`
          :`<button class="btn btn-xs" style="background:var(--bgd);color:var(--txd)" onclick="blockMachine(${m.id},'${m.name}')">Bloquear</button>`) : ''}
        <button class="btn btn-ghost btn-xs" style="margin-left:4px" onclick="openRemoteWifi(${m.id},'${m.name.replace(/'/g,"&#39;")}',${m.online?'true':'false'})" ${m.online?'':'disabled title="Solo disponible si la máquina está online"'}>WiFi</button>
        <button class="btn btn-ghost btn-xs" style="margin-left:4px" onclick="restartMachine(${m.id},'${m.name.replace(/'/g,"&#39;")}',${m.online?'true':'false'})" ${m.online?'':'disabled title="Solo disponible si la máquina está online"'}>Reiniciar</button>
        <button class="btn btn-ghost btn-xs" style="margin-left:4px" onclick="openRemoteDiagnostics(${m.id},'${m.name.replace(/'/g,"&#39;")}',${m.online?'true':'false'})" ${m.online?'':'disabled title="Solo disponible si la máquina está online"'}>Diag</button>
        ${technicalConfig?`<button class="btn btn-ghost btn-xs" style="margin-left:4px" onclick="openMachineTechnicalConfig(${m.id})">Config técnica</button>`:''}
        <button class="btn btn-ghost btn-xs" style="margin-left:4px" onclick='openMachineStock(${m.id},${JSON.stringify(m.name)})'>Stock</button>
        ${manager?`<button class="btn btn-ghost btn-xs" style="margin-left:4px" onclick="openEditMachine(${m.id})">Editar</button>`:''}
        <button class="btn btn-ghost btn-xs" style="margin-left:4px" onclick="machineDetail(${m.id},'${m.name}')">Ver</button>
        ${manager?`<button class="btn btn-ghost btn-xs" style="margin-left:4px;color:var(--txd)" onclick="deleteMachine(${m.id},'${m.name}')">Eliminar</button>`:''}
      </td>
    </tr>`;
  }).join('');
  const tbody=document.getElementById('machinesTbody');
  if(tbody) tbody.innerHTML=rows||'<tr><td colspan="7" class="empty">Sin resultados</td></tr>';
}

function resetMachineFilters(){
  ['mfSearch','mfStatus','mfActivity'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});

async function submitRemoteWifi(id){
