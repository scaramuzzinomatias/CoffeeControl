<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoffeeControl — Superadmin</title>
<style>
:root{
  --bg:#1e1e1c;--bg2:#282825;--bg3:#111110;
  --bgi:#042c53;--bgs:#173404;--bgw:#412402;--bgd:#501313;
  --tx:#e8e7e1;--tx2:#a8a69e;--tx3:#6e6c66;
  --txi:#85b7eb;--txs:#c0dd97;--txw:#fac775;--txd:#f09595;
  --br:rgba(255,255,240,.10);--brm:rgba(255,255,240,.20);
  --r:8px;--rl:12px;
  --f:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
html.light{
  --bg:#fff;--bg2:#f5f5f3;--bg3:#eeede9;
  --bgi:#e6f1fb;--bgs:#eaf3de;--bgw:#faeeda;--bgd:#fcebeb;
  --tx:#1a1a18;--tx2:#5f5e5a;--tx3:#9c9a92;
  --txi:#0c447c;--txs:#27500a;--txw:#633806;--txd:#791f1f;
  --br:rgba(30,30,20,.12);--brm:rgba(30,30,20,.22);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--f);background:var(--bg3);color:var(--tx);min-height:100vh;}
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px;}
.login-box{background:var(--bg);border:1px solid var(--br);border-radius:var(--rl);padding:36px;width:100%;max-width:380px;}
.login-logo{font-size:18px;font-weight:500;margin-bottom:4px;}
.login-sub{font-size:12px;color:var(--tx3);margin-bottom:28px;}
.login-err{background:var(--bgd);color:var(--txd);border-radius:var(--r);padding:8px 12px;font-size:13px;margin-bottom:12px;display:none;}
#appScreen{display:none;min-height:100vh;padding:28px;}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-wrap:wrap;gap:10px;}
.page-title{font-size:18px;font-weight:500;}
.top-actions{display:flex;gap:10px;align-items:center;}
input,select,textarea{border:1px solid var(--brm);border-radius:var(--r);font-size:13px;font-family:var(--f);color:var(--tx);background:var(--bg);padding:8px 10px;width:100%;}
input:focus,select:focus{outline:2px solid var(--txi);border-color:transparent;}
label{font-size:12px;color:var(--tx2);display:block;margin-bottom:4px;}
.field{margin-bottom:14px;}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{padding:8px 16px;border-radius:var(--r);font-size:13px;font-family:var(--f);cursor:pointer;font-weight:500;border:none;transition:opacity .15s;}
.btn:hover{opacity:.85;}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-primary{background:#185FA5;color:#fff;}
.btn-danger{background:#A32D2D;color:#fff;}
.btn-ghost{background:var(--bg2);color:var(--tx);border:1px solid var(--brm);}
.btn-sm{padding:5px 12px;font-size:12px;}
.card{background:var(--bg);border:1px solid var(--br);border-radius:var(--rl);padding:20px;margin-bottom:16px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{text-align:left;font-size:11px;font-weight:500;color:var(--tx2);text-transform:uppercase;letter-spacing:.05em;padding:0 10px 10px;}
td{padding:10px;border-bottom:1px solid var(--br);vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:var(--bg2);}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:100px;font-size:11px;font-weight:500;}
.bs{background:var(--bgs);color:var(--txs);}
.bw{background:var(--bgw);color:var(--txw);}
.bd{background:var(--bgd);color:var(--txd);}
.bi{background:var(--bgi);color:var(--txi);}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
.modal-bg.show{display:flex;}
.modal{background:var(--bg);border-radius:var(--rl);padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:500;margin-bottom:20px;}
.modal-footer{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.err-banner{background:var(--bgd);color:var(--txd);border-radius:var(--r);padding:8px 12px;font-size:12px;margin-bottom:12px;display:none;}
.empty{color:var(--tx3);font-size:13px;padding:20px 0;text-align:center;}
@media(max-width:700px){#appScreen{padding:16px;}.field-row{grid-template-columns:1fr;}}
</style>
<script>if(localStorage.getItem('cc_theme')==='light')document.documentElement.classList.add('light');</script>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">CoffeeControl</div>
    <div class="login-sub">Superadmin</div>
    <div class="login-err" id="loginErr"></div>
    <div class="field">
      <label>Clave superadmin</label>
      <input type="password" id="saKey" placeholder="••••••••" autocomplete="off">
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:10px" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<div id="appScreen">
  <div class="topbar">
    <div class="page-title">Empresas</div>
    <div class="top-actions">
      <button class="btn btn-primary btn-sm" onclick="openAddTenant()">+ Nueva empresa</button>
      <button class="btn btn-ghost btn-sm" onclick="toggleTheme()" id="themeBtn" title="Modo claro / oscuro">☀</button>
      <button class="btn btn-ghost btn-sm" onclick="doLogout()">Cerrar sesión</button>
    </div>
  </div>
  <div class="card" id="tenantsContainer">
    <div class="empty">Cargando...</div>
  </div>
</div>

<div class="modal-bg" id="modal"><div class="modal" id="modalInner"></div></div>

<script>
(function(){
  const key = localStorage.getItem('superadmin_secret');
  if (key) document.getElementById('saKey').value = key;
})();

const BASE = window.location.origin;
let editingId = null;

document.getElementById('saKey').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doLogin();
});

function esc(v) {
  return String(v ?? '').replace(/[&<>"']/g, function(ch) {
    return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[ch];
  });
}

function getSecret() {
  return localStorage.getItem('superadmin_secret');
}

async function api(method, path, body) {
  const secret = getSecret();
  if (!secret) { doLogout(); throw new Error('Sesión expirada'); }
  const opts = { method, headers: { 'X-Superadmin-Secret': secret, 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(BASE + path, opts);
  const d = await res.json().catch(function() { return {}; });
  if (!res.ok) throw new Error(d.error || 'HTTP ' + res.status);
  return d;
}

function v(id) {
  const el = document.getElementById(id);
  return el ? el.value.trim() || null : null;
}

function showErr(id, msg) {
  const el = document.getElementById(id);
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

async function doLogin() {
  const key = document.getElementById('saKey').value.trim();
  if (!key) { showErr('loginErr', 'Ingresá la clave superadmin'); return; }
  document.getElementById('loginErr').style.display = 'none';
  localStorage.setItem('superadmin_secret', key);
  try {
    await loadTenants();
  } catch (e) {
    localStorage.removeItem('superadmin_secret');
    document.getElementById('saKey').value = '';
    showErr('loginErr', e.message);
  }
}

function doLogout() {
  localStorage.removeItem('superadmin_secret');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('appScreen').style.display = 'none';
  document.getElementById('saKey').value = '';
}

async function loadTenants() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('appScreen').style.display = 'block';
  const d = await api('GET', '/api/superadmin/tenants');
  renderTenants(d.tenants || []);
}

function renderTenants(tenants) {
  const container = document.getElementById('tenantsContainer');
  if (!tenants.length) {
    container.innerHTML = '<div class="empty">No hay empresas registradas.</div>';
    return;
  }
  const rows = tenants.map(function(t) {
    const active = t.active;
    const badge = active
      ? '<span class="badge bs">Activo</span>'
      : '<span class="badge bd">Inactivo</span>';
    const created = t.created_at ? new Date(t.created_at).toLocaleDateString('es-AR') : '-';
    const toggleLabel = active ? 'Desactivar' : 'Activar';
    return '<tr>'
      + '<td><strong>' + esc(t.name) + '</strong></td>'
      + '<td><code>' + esc(t.slug) + '</code></td>'
      + '<td>' + badge + '</td>'
      + '<td>' + created + '</td>'
      + '<td style="text-align:right;white-space:nowrap">'
      + '<button class="btn btn-ghost btn-sm btn-edit" data-id="' + t.id + '" data-name="' + esc(t.name) + '" data-slug="' + esc(t.slug) + '">Editar</button> '
      + '<button class="btn btn-ghost btn-sm btn-toggle" data-id="' + t.id + '" data-active="' + active + '" data-name="' + esc(t.name) + '">' + toggleLabel + '</button>'
      + '</td></tr>';
  }).join('');
  container.innerHTML = '<table><thead><tr>'
    + '<th>Nombre</th><th>Slug</th><th>Estado</th><th>Creado</th><th></th>'
    + '</tr></thead><tbody>' + rows + '</tbody></table>';
}

function openModal(title, body, saveCall) {
  document.getElementById('modal').classList.add('show');
  document.getElementById('modalInner').innerHTML = ''
    + '<div class="modal-title">' + title + '</div>'
    + '<div id="modalBody">' + body + '</div>'
    + '<div class="modal-footer">'
    + '<button class="btn btn-ghost" onclick="closeModal()">Cerrar</button>'
    + (saveCall ? '<button class="btn btn-primary" onclick="' + saveCall + '">Guardar</button>' : '')
    + '</div>';
}
function closeModal() {
  document.getElementById('modal').classList.remove('show');
}
document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === document.getElementById('modal')) closeModal();
});
document.getElementById('tenantsContainer').addEventListener('click', function(e) {
  const editBtn = e.target.closest('.btn-edit');
  if (editBtn) {
    openEditTenant(Number(editBtn.dataset.id), editBtn.dataset.name, editBtn.dataset.slug);
    return;
  }
  const toggleBtn = e.target.closest('.btn-toggle');
  if (toggleBtn) {
    const newActive = toggleBtn.dataset.active !== 'true';
    toggleActive(Number(toggleBtn.dataset.id), newActive, toggleBtn.dataset.name);
  }
});

function openAddTenant() {
  editingId = null;
  openModal('Nueva empresa',
    '<div class="field"><label>Nombre de la empresa *</label><input id="tName" placeholder="Mi Empresa"></div>'
    + '<div class="field"><label>Slug *</label><input id="tSlug" placeholder="mi-empresa" style="text-transform:lowercase"></div>'
    + '<div class="field"><label style="font-size:11px;color:var(--tx3)">El slug se usa en la URL (mi-empresa.coffeecontrol.smartq.com.ar). Solo minúsculas, números y guiones.</label></div>'
    + '<div class="err-banner" id="tErr"></div>',
    'saveTenant()');
  document.getElementById('tSlug').addEventListener('input', function() {
    this.value = this.value.toLowerCase().replace(/[^a-z0-9-]/g, '');
  });
}

function openEditTenant(id, name, slug) {
  editingId = id;
  openModal('Editar empresa',
    '<div class="field"><label>Nombre</label><input id="tName" value="' + esc(name) + '"></div>'
    + '<div class="field"><label>Slug</label><input id="tSlug" value="' + esc(slug) + '" style="text-transform:lowercase"></div>'
    + '<div class="err-banner" id="tErr"></div>',
    'saveTenant()');
  document.getElementById('tSlug').addEventListener('input', function() {
    this.value = this.value.toLowerCase().replace(/[^a-z0-9-]/g, '');
  });
}

async function saveTenant() {
  const name = v('tName');
  const slug = v('tSlug');
  if (!name) { showErr('tErr', 'El nombre es requerido'); return; }
  if (!slug) { showErr('tErr', 'El slug es requerido'); return; }
  try {
    if (editingId) {
      await api('PATCH', '/api/superadmin/tenants/' + editingId, { name: name, slug: slug });
    } else {
      await api('POST', '/api/superadmin/tenants', { name: name, slug: slug });
    }
    closeModal();
    await loadTenants();
  } catch (e) {
    showErr('tErr', e.message);
  }
}

async function toggleActive(id, newActive, name) {
  var label = newActive ? 'activar' : 'desactivar';
  if (!confirm('\u00bf' + label + ' la empresa "' + name + '"?')) return;
  try {
    await api('PATCH', '/api/superadmin/tenants/' + id, { active: newActive });
    await loadTenants();
  } catch (e) {
    alert('Error: ' + e.message);
  }
}

function toggleTheme() {
  var light = document.documentElement.classList.toggle('light');
  localStorage.setItem('cc_theme', light ? 'light' : 'dark');
  document.getElementById('themeBtn').textContent = light ? '\u263D' : '\u2600';
}
(function() {
  var btn = document.getElementById('themeBtn');
  if (btn) btn.textContent = document.documentElement.classList.contains('light') ? '\u263D' : '\u2600';
})();
</script>
</body>
</html>
