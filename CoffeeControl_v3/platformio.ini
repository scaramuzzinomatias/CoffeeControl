; ══════════════════════════════════════════════════════
;  CoffeeControl v3 — PlatformIO project
;  Target: ESP32-C3 Super Mini
;
;  Para compilar y subir:
;    pio run -e esp32c3 -t upload
;
;  Monitor serial:
;    pio device monitor
;
;  Cargar filesystem (LittleFS):
;    pio run -e esp32c3 -t uploadfs
; ══════════════════════════════════════════════════════

[platformio]
default_envs = esp32c3

; ── Dependencias comunes ──────────────────────────────
[common]
lib_deps =
    miguelbalboa/MFRC522 @ ^1.4.10
    bblanchon/ArduinoJson @ ^6.21.4

; ── ESP32-C3 Super Mini (target de producción) ────────
[env:esp32c3]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

; LittleFS para cards.json y queue.json
board_build.filesystem = littlefs

; Flash mode QIO (más rápido, compatible con Super Mini)
board_build.flash_mode = qio

; Habilitar USB-CDC por firmware para el monitor serial
; (el ESP32-C3 usa USB nativo, no UART-USB chip externo)
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

lib_deps = ${common.lib_deps}
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder
upload_speed   = 921600
